openapi: 3.1.0
info:
  title: auth-service API
  version: 0.1.0
  description: Medikong auth-service contract draft.

servers:
  - url: http://localhost:8081
    description: local

security: []

paths:
  /auth/login:
    $ref: ./paths/auth_login.yaml
  /auth/refresh:
    $ref: ./paths/auth_refresh.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          examples:
            - patient
        password:
          type: string
          format: password
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    UserResponse:
      type: object
      required:
        - id
        - email
        - displayName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
          examples:
            - patient
        displayName:
          type: string
          examples:
            - Lee Seoyeon
        role:
          $ref: ../../common/components.yaml#/components/schemas/UserRole
        patientId:
          type:
            - integer
            - "null"
        doctorId:
          type:
            - integer
            - "null"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
        - refreshExpiresIn
        - user
      properties:
        accessToken:
          type: string
          description: HS256 JWT matching the common JwtAccessTokenClaims payload contract.
        refreshToken:
          type: string
          description: Opaque refresh token string.
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          minimum: 1
          description: Access token lifetime in seconds.
        refreshExpiresIn:
          type: integer
          minimum: 1
          description: Refresh token lifetime in seconds.
        user:
          $ref: "#/components/schemas/UserResponse"
