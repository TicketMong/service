openapi: 3.1.0
info:
  title: auth-service API
  version: 0.1.0
  description: Medikong auth-service contract draft.

servers:
  - url: http://localhost:8081
    description: local

security: []

paths:
  /auth/login:
    $ref: ./paths/auth_login.yaml
  /auth/refresh:
    $ref: ./paths/auth_refresh.yaml
  /auth/me:
    $ref: ./paths/auth_me.yaml
  /auth/logout:
    $ref: ./paths/auth_logout.yaml
  /healthz:
    $ref: ./paths/healthz.yaml
  /readyz:
    $ref: ./paths/readyz.yaml
  /metrics:
    $ref: ./paths/metrics.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          examples:
            - customer@example.com
        password:
          type: string
          format: password
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type:
            - string
            - "null"
    UserResponse:
      type: object
      required:
        - id
        - email
        - displayName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          examples:
            - customer@example.com
        displayName:
          type: string
          examples:
            - Kim Ticket
        role:
          $ref: ../../common/components.yaml#/components/schemas/UserRole
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
    TokenResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - expiresIn
        - refreshExpiresIn
        - user
      properties:
        accessToken:
          type: string
          description: HS256 JWT matching the common JwtAccessTokenClaims payload contract, including the CUSTOMER, PROVIDER, or ADMIN role claim.
        refreshToken:
          type: string
          description: Opaque refresh token string.
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          minimum: 1
          description: Access token lifetime in seconds.
        refreshExpiresIn:
          type: integer
          minimum: 1
          description: Refresh token lifetime in seconds.
        user:
          $ref: "#/components/schemas/UserResponse"
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          examples:
            - ok
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          examples:
            - ok
        service:
          type: string
          examples:
            - auth-service
    ReadinessResponse:
      type: object
      required:
        - status
        - service
        - checks
      properties:
        status:
          type: string
          examples:
            - ready
        service:
          type: string
          examples:
            - auth-service
        checks:
          type: object
          additionalProperties:
            type: string
          examples:
            - database: ok
