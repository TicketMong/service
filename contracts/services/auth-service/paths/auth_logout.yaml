post:
  summary: Logout
  operationId: logout
  security:
    - BearerAuth: []
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../openapi.yaml#/components/schemas/LogoutRequest
  responses:
    "200":
      description: Access token revoked and refresh token revoked when provided.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/StatusResponse
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "422":
      $ref: ../../../common/components.yaml#/components/responses/UnprocessableEntity
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
