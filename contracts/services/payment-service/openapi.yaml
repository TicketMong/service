openapi: 3.1.0
info:
  title: payment-service API
  version: 0.1.0
  description: Medikong payment-service contract draft.

servers:
  - url: http://localhost:8084
    description: local

security:
  - BearerAuth: []

paths:
  /payments:
    $ref: ./paths/payments.yaml
  /payments/{paymentId}:
    $ref: ./paths/payments_{paymentId}.yaml
  /provider/concerts/{concertId}/settlement-basis:
    $ref: ./paths/provider_concerts_{concertId}_settlement-basis.yaml
  /admin/concerts/{concertId}/settlement-basis:
    $ref: ./paths/admin_concerts_{concertId}_settlement-basis.yaml
  /healthz:
    $ref: ./paths/healthz.yaml
  /readyz:
    $ref: ./paths/readyz.yaml
  /metrics:
    $ref: ./paths/metrics.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    CreatePaymentRequest:
      type: object
      required:
        - reservationId
        - amount
        - method
      properties:
        reservationId:
          type: string
        concertId:
          type: string
          description: Concert id used for settlement aggregation. Optional until reservation-service integration provides it.
        amount:
          type: integer
          minimum: 0
        method:
          type: string
          enum:
            - card
            - transfer
            - mock
        simulation:
          type: string
          enum:
            - approve
            - fail
            - delay
          default: approve
    Payment:
      type: object
      required:
        - id
        - reservationId
        - concertId
        - amount
        - method
        - status
        - createdAt
      properties:
        id:
          type: string
        reservationId:
          type: string
        concertId:
          type: string
        amount:
          type: integer
          minimum: 0
        method:
          type: string
        status:
          type: string
          enum:
            - pending
            - approved
            - failed
            - delayed
        approvedAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
    SettlementBasisResponse:
      type: object
      required:
        - concertId
        - grossAmount
        - refundAmount
        - netAmount
        - ticketCount
        - calculatedAt
      properties:
        concertId:
          type: string
        grossAmount:
          type: integer
          minimum: 0
        refundAmount:
          type: integer
          minimum: 0
        netAmount:
          type: integer
          minimum: 0
        ticketCount:
          type: integer
          minimum: 0
        platformFeeAmount:
          type: integer
          minimum: 0
        providerSettlementAmount:
          type: integer
          minimum: 0
        calculatedAt:
          type: string
          format: date-time
