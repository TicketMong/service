get:
  tags:
    - User API
  summary: List recommended concerts
  operationId: listRecommendedConcerts
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
    - name: sort
      in: query
      required: false
      schema:
        type: string
        enum:
          - latest
        default: latest
    - $ref: ../../../common/components.yaml#/components/parameters/cursor
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 12
  responses:
    "200":
      description: Recommended concert card list.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/RecommendedConcertListResponse
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
