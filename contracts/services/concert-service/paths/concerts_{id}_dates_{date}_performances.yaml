get:
  tags:
    - User API
  summary: List concert performances by date
  operationId: listConcertDatePerformances
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/X-Request-Id
    - $ref: ../../../common/components.yaml#/components/parameters/X-Trace-Id
    - $ref: ../../../common/components.yaml#/components/parameters/id
    - name: date
      in: path
      required: true
      schema:
        type: string
        format: date
  responses:
    "200":
      description: Performances for one selected date.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/DatePerformanceListResponse
    "400":
      $ref: ../../../common/components.yaml#/components/responses/BadRequest
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "404":
      $ref: ../../../common/components.yaml#/components/responses/NotFound
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
