openapi: 3.1.0
info:
  title: concert-service API
  version: 0.1.0
  description: Medikong concert-service contract draft.

servers:
  - url: http://localhost:8082
    description: local

security:
  - BearerAuth: []

paths:
  /healthz:
    $ref: ./paths/healthz.yaml
  /readyz:
    $ref: ./paths/readyz.yaml
  /metrics:
    $ref: ./paths/metrics.yaml
  /concerts:
    $ref: ./paths/concerts.yaml
  /concerts/recommended:
    $ref: ./paths/concerts_recommended.yaml
  /concerts/{id}:
    $ref: ./paths/concerts_{id}.yaml
  /concerts/{id}/calendar:
    $ref: ./paths/concerts_{id}_calendar.yaml
  /concerts/{id}/performances:
    $ref: ./paths/concerts_{id}_performances.yaml
  /concerts/{id}/dates/{date}/performances:
    $ref: ./paths/concerts_{id}_dates_{date}_performances.yaml
  /performances/{id}/seats:
    $ref: ./paths/performances_{id}_seats.yaml
  /performances/{id}/seat-map:
    $ref: ./paths/performances_{id}_seat-map.yaml
  /provider/concerts:
    $ref: ./paths/provider_concerts.yaml
  /provider/concerts/{concertId}:
    $ref: ./paths/provider_concerts_{concertId}.yaml
  /provider/venues:
    $ref: ./paths/provider_venues.yaml
  /provider/concerts/{concertId}/showtimes:
    $ref: ./paths/provider_concerts_{concertId}_showtimes.yaml
  /provider/showtimes/{showtimeId}:
    $ref: ./paths/provider_showtimes_{showtimeId}.yaml
  /provider/showtimes/{showtimeId}/seat-map:
    $ref: ./paths/provider_showtimes_{showtimeId}_seat-map.yaml
  /provider/showtimes/{showtimeId}/seat-inventory:
    $ref: ./paths/provider_showtimes_{showtimeId}_seat-inventory.yaml
  /provider/showtimes/{showtimeId}/seat-grades:
    $ref: ./paths/provider_showtimes_{showtimeId}_seat-grades.yaml
  /provider/showtimes/{showtimeId}/hold-seat-requests:
    $ref: ./paths/provider_showtimes_{showtimeId}_hold-seat-requests.yaml
  /provider/concerts/{concertId}/sale-policy:
    $ref: ./paths/provider_concerts_{concertId}_sale-policy.yaml
  /provider/concerts/{concertId}/open-request:
    $ref: ./paths/provider_concerts_{concertId}_open-request.yaml
  /provider/concerts/{concertId}/review-status:
    $ref: ./paths/provider_concerts_{concertId}_review-status.yaml
  /admin/concert-requests:
    $ref: ./paths/admin_concert-requests.yaml
  /admin/concert-requests/{requestId}:
    $ref: ./paths/admin_concert-requests_{requestId}.yaml
  /admin/concert-requests/{requestId}/approve:
    $ref: ./paths/admin_concert-requests_{requestId}_approve.yaml
  /admin/concert-requests/{requestId}/reject:
    $ref: ./paths/admin_concert-requests_{requestId}_reject.yaml
  /admin/concerts/{concertId}/open-schedule:
    $ref: ./paths/admin_concerts_{concertId}_open-schedule.yaml
  /admin/concerts/{concertId}/sale-policy:
    $ref: ./paths/admin_concerts_{concertId}_sale-policy.yaml
  /admin/concerts/{concertId}/sale-policy/approve:
    $ref: ./paths/admin_concerts_{concertId}_sale-policy_approve.yaml
  /admin/concerts/{concertId}/sale-policy/reject:
    $ref: ./paths/admin_concerts_{concertId}_sale-policy_reject.yaml
  /admin/concerts/{concertId}/canceled-seat-reopen-policy:
    $ref: ./paths/admin_concerts_{concertId}_canceled-seat-reopen-policy.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    Concert:
      type: object
      required:
        - id
        - title
        - venue
        - startsAt
        - status
      properties:
        id:
          type: string
        title:
          type: string
        venue:
          $ref: "#/components/schemas/Venue"
        startsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - scheduled
            - open
            - closed
            - canceled
    Venue:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
    Performance:
      type: object
      required:
        - id
        - concertId
        - venueId
        - startsAt
        - status
      properties:
        id:
          type: string
        concertId:
          type: string
        venueId:
          type: string
        startsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - scheduled
            - open
            - closed
            - canceled
    Seat:
      type: object
      required:
        - id
        - performanceId
        - section
        - row
        - number
        - status
      properties:
        id:
          type: string
        performanceId:
          type: string
        section:
          type: string
        row:
          type: string
        number:
          type: string
        status:
          type: string
          enum:
            - available
            - locked
            - reserved
    ConcertListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Concert"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    RecommendedVenueSummary:
      type: object
      required:
        - venueId
        - name
      properties:
        venueId:
          type: string
        name:
          type: string
        city:
          type: string
    PerformancePeriod:
      type: object
      required:
        - startDate
        - endDate
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
    RecommendedConcert:
      type: object
      required:
        - concertId
        - title
        - venue
        - performancePeriod
        - saleBadge
        - createdAt
      properties:
        concertId:
          type: string
        title:
          type: string
        posterImageUrl:
          type: string
          format: uri
        venue:
          $ref: "#/components/schemas/RecommendedVenueSummary"
        performancePeriod:
          $ref: "#/components/schemas/PerformancePeriod"
        saleBadge:
          type: string
          enum:
            - ON_SALE
            - COMING_SOON
            - SOLD_OUT
            - CLOSED
        createdAt:
          type: string
          format: date-time
    CursorPageInfo:
      type: object
      required:
        - hasMore
        - limit
      properties:
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
        limit:
          type: integer
    RecommendedConcertListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedConcert"
        page:
          $ref: "#/components/schemas/CursorPageInfo"
    ConcertDetailVenue:
      type: object
      required:
        - venueId
        - name
      properties:
        venueId:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
    BookingPeriod:
      type: object
      properties:
        openAt:
          type: string
          format: date-time
        closeAt:
          type: string
          format: date-time
    PriceBand:
      type: object
      required:
        - gradeCode
        - gradeName
        - price
        - currency
      properties:
        gradeCode:
          type: string
        gradeName:
          type: string
        price:
          type: integer
          minimum: 0
        currency:
          type: string
    PurchaseLimit:
      type: object
      required:
        - maxTicketsPerUser
        - maxTicketsPerPerformance
      properties:
        maxTicketsPerUser:
          type: integer
          minimum: 1
        maxTicketsPerPerformance:
          type: integer
          minimum: 1
    ConcertDetail:
      type: object
      required:
        - concertId
        - title
        - venue
        - performancePeriod
        - bookingPeriod
        - priceBands
        - purchaseLimit
        - notices
        - saleStatus
      properties:
        concertId:
          type: string
        title:
          type: string
        description:
          type: string
        posterImageUrl:
          type: string
          format: uri
        venue:
          $ref: "#/components/schemas/ConcertDetailVenue"
        performancePeriod:
          $ref: "#/components/schemas/PerformancePeriod"
        bookingPeriod:
          $ref: "#/components/schemas/BookingPeriod"
        priceBands:
          type: array
          items:
            $ref: "#/components/schemas/PriceBand"
        purchaseLimit:
          $ref: "#/components/schemas/PurchaseLimit"
        notices:
          type: array
          items:
            type: string
        saleStatus:
          type: string
          enum:
            - ON_SALE
            - COMING_SOON
            - SOLD_OUT
            - CLOSED
    CalendarDay:
      type: object
      required:
        - date
        - bookable
      properties:
        date:
          type: string
          format: date
        bookable:
          type: boolean
    ConcertCalendarResponse:
      type: object
      required:
        - concertId
        - yearMonth
        - timezone
        - days
      properties:
        concertId:
          type: string
        yearMonth:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
        timezone:
          type: string
        days:
          type: array
          items:
            $ref: "#/components/schemas/CalendarDay"
    PerformanceListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Performance"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    DatePerformance:
      type: object
      required:
        - performanceId
        - startsAt
        - saleStatus
      properties:
        performanceId:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        saleStatus:
          type: string
          enum:
            - ON_SALE
            - COMING_SOON
            - SOLD_OUT
            - CLOSED
    DatePerformanceListResponse:
      type: object
      required:
        - concertId
        - date
        - timezone
        - performances
      properties:
        concertId:
          type: string
        date:
          type: string
          format: date
        timezone:
          type: string
        performances:
          type: array
          items:
            $ref: "#/components/schemas/DatePerformance"
    SeatListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Seat"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    SeatMapVenue:
      type: object
      required:
        - venueId
        - name
      properties:
        venueId:
          type: string
        name:
          type: string
    SeatMapSection:
      type: object
      required:
        - sectionId
        - name
        - gradeCode
        - price
        - currency
        - available
      properties:
        sectionId:
          type: string
        name:
          type: string
        gradeCode:
          type: string
        price:
          type: integer
          minimum: 0
        currency:
          type: string
        available:
          type: boolean
    SeatMapSeat:
      type: object
      required:
        - seatId
        - sectionId
        - row
        - number
        - gradeCode
        - status
      properties:
        seatId:
          type: string
        sectionId:
          type: string
        row:
          type: string
        number:
          type: string
        gradeCode:
          type: string
        status:
          type: string
          enum:
            - AVAILABLE
            - UNAVAILABLE
            - ACCESSIBLE_ONLY
    SeatMapResponse:
      type: object
      required:
        - performanceId
        - venue
        - mapVersion
        - sections
        - seats
      properties:
        performanceId:
          type: string
        venue:
          $ref: "#/components/schemas/SeatMapVenue"
        mapVersion:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SeatMapSection"
        seats:
          type: array
          items:
            $ref: "#/components/schemas/SeatMapSeat"
    ConcertDraft:
      type: object
      required:
        - id
        - providerId
        - title
        - status
        - createdAt
      properties:
        id:
          type: string
        providerId:
          type: string
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
          format: uri
        ageRating:
          type: string
        runningMinutes:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
            - draft
            - submitted
            - approved
            - rejected
            - scheduled
            - open
            - canceled
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ConcertDraftCreateRequest:
      type: object
      required:
        - title
        - ageRating
        - runningMinutes
      properties:
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
          format: uri
        ageRating:
          type: string
        runningMinutes:
          type: integer
          minimum: 1
    ConcertUpdateRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
          format: uri
        ageRating:
          type: string
        runningMinutes:
          type: integer
          minimum: 1
    VenueCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        address:
          type: string
        totalSeats:
          type: integer
          minimum: 0
    VenueListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Venue"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    Showtime:
      type: object
      required:
        - id
        - concertId
        - venueId
        - startsAt
        - status
      properties:
        id:
          type: string
        concertId:
          type: string
        venueId:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - draft
            - ready
            - open
            - closed
            - canceled
    ShowtimeCreateRequest:
      type: object
      required:
        - venueId
        - startsAt
      properties:
        venueId:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
    ShowtimeUpdateRequest:
      type: object
      minProperties: 1
      properties:
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - draft
            - ready
            - open
            - closed
            - canceled
    SeatMapRequest:
      type: object
      required:
        - sections
      properties:
        sections:
          type: array
          items:
            type: object
            required:
              - name
              - rows
            properties:
              name:
                type: string
              rows:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - seatNumbers
                  properties:
                    name:
                      type: string
                    seatNumbers:
                      type: array
                      items:
                        type: string
    SeatInventoryUpdateRequest:
      type: object
      required:
        - seats
      properties:
        seats:
          type: array
          items:
            type: object
            required:
              - seatId
              - status
            properties:
              seatId:
                type: string
              status:
                type: string
                enum:
                  - sellable
                  - blocked
                  - hold
              reason:
                type: string
    SeatGrade:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: integer
          minimum: 0
        color:
          type: string
    SeatGradeCreateRequest:
      type: object
      required:
        - grades
      properties:
        grades:
          type: array
          items:
            $ref: "#/components/schemas/SeatGrade"
    HoldSeatRequest:
      type: object
      required:
        - id
        - showtimeId
        - type
        - seatIds
        - status
      properties:
        id:
          type: string
        showtimeId:
          type: string
        type:
          type: string
          enum:
            - invitation
            - staff
            - reserved
            - accessible
        seatIds:
          type: array
          items:
            type: string
        reason:
          type: string
        status:
          type: string
          enum:
            - requested
            - approved
            - rejected
    HoldSeatRequestCreateRequest:
      type: object
      required:
        - type
        - seatIds
      properties:
        type:
          type: string
          enum:
            - invitation
            - staff
            - reserved
            - accessible
        seatIds:
          type: array
          items:
            type: string
        reason:
          type: string
    SalePolicy:
      type: object
      required:
        - concertId
        - maxTicketsPerUser
        - refundPolicy
        - status
      properties:
        concertId:
          type: string
        presaleEnabled:
          type: boolean
          default: false
        fanclubVerificationRequired:
          type: boolean
          default: false
        maxTicketsPerUser:
          type: integer
          minimum: 1
        refundPolicy:
          type: string
        status:
          type: string
          enum:
            - draft
            - submitted
            - approved
            - rejected
    SalePolicyUpdateRequest:
      type: object
      required:
        - maxTicketsPerUser
        - refundPolicy
      properties:
        presaleEnabled:
          type: boolean
        fanclubVerificationRequired:
          type: boolean
        maxTicketsPerUser:
          type: integer
          minimum: 1
        refundPolicy:
          type: string
    OpenRequest:
      type: object
      required:
        - id
        - concertId
        - requestedOpenAt
        - status
      properties:
        id:
          type: string
        concertId:
          type: string
        requestedOpenAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - requested
            - approved
            - rejected
        message:
          type: string
    OpenRequestCreateRequest:
      type: object
      required:
        - requestedOpenAt
      properties:
        requestedOpenAt:
          type: string
          format: date-time
        message:
          type: string
    ReviewStatusResponse:
      type: object
      required:
        - concertId
        - concertStatus
        - salePolicyStatus
        - openRequestStatus
      properties:
        concertId:
          type: string
        concertStatus:
          type: string
        salePolicyStatus:
          type: string
        openRequestStatus:
          type: string
        lastReviewedAt:
          type:
            - string
            - "null"
          format: date-time
        reason:
          type: string
    ConcertReviewRequest:
      type: object
      required:
        - id
        - concertId
        - providerId
        - type
        - status
        - submittedAt
      properties:
        id:
          type: string
        concertId:
          type: string
        providerId:
          type: string
        type:
          type: string
          enum:
            - concert
            - sale_policy
            - open_request
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        submittedAt:
          type: string
          format: date-time
        concert:
          $ref: "#/components/schemas/ConcertDraft"
        salePolicy:
          $ref: "#/components/schemas/SalePolicy"
        openRequest:
          $ref: "#/components/schemas/OpenRequest"
    ConcertReviewRequestListResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConcertReviewRequest"
        page:
          $ref: ../../common/components.yaml#/components/schemas/PageInfo
    ApprovalCommand:
      type: object
      properties:
        comment:
          type: string
    RejectCommand:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
    OpenScheduleUpdateRequest:
      type: object
      required:
        - opensAt
      properties:
        opensAt:
          type: string
          format: date-time
        comment:
          type: string
    OpenScheduleResponse:
      type: object
      required:
        - concertId
        - opensAt
        - status
      properties:
        concertId:
          type: string
        opensAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - scheduled
            - approved
            - rejected
    CanceledSeatReopenPolicyRequest:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        reopenDelaySeconds:
          type: integer
          minimum: 0
        batchSize:
          type: integer
          minimum: 1
        comment:
          type: string
    CanceledSeatReopenPolicyResponse:
      type: object
      required:
        - concertId
        - enabled
      properties:
        concertId:
          type: string
        enabled:
          type: boolean
        reopenDelaySeconds:
          type: integer
          minimum: 0
        batchSize:
          type: integer
          minimum: 1
