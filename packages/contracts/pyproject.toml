[project]
name = "contracts"
version = "0.1.0"
description = "Shared event contracts for service communication"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
]

[dependency-groups]
test = [
    "pytest==9.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
