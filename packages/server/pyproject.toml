[project]
name = "server"
version = "0.1.0"
description = "Shared FastAPI server utilities for services"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.124.0",
    "middleware",
    "observability",
    "prometheus-client==0.23.1",
    "sqlalchemy>=2.0.41,<3.0.0",
]

[dependency-groups]
test = [
    "httpx==0.28.1",
    "pytest==9.0.2",
]

[tool.uv.sources]
errors = { path = "../errors", editable = true }
middleware = { path = "../middleware", editable = true }
observability = { path = "../observability", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src", "../errors/src", "../middleware/src", "../observability/src"]
