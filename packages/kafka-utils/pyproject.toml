[project]
name = "kafka-utils"
version = "0.1.0"
description = "Kafka producer constructor and propagation utilities for Medikong services"
requires-python = ">=3.12"
dependencies = [
    "aiokafka==0.12.0",
    "opentelemetry-api==1.42.1",
]

[dependency-groups]
test = [
    "pytest==9.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
