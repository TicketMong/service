[project]
name = "observability"
version = "0.1.0"
description = "Shared FastAPI observability utilities for services"
requires-python = ">=3.12"
dependencies = [
    "asgi-correlation-id==5.0.0",
    "fastapi==0.124.0",
    "opentelemetry-exporter-otlp==1.42.1",
    "opentelemetry-instrumentation-fastapi==0.63b1",
    "opentelemetry-instrumentation-logging==0.63b1",
    "opentelemetry-sdk==1.42.1",
    "structlog==25.5.0",
]

[dependency-groups]
test = [
    "httpx==0.28.1",
    "pytest==9.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["src"]
