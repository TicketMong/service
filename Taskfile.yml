version: "3"

vars:
  VENV_DIR: '{{default ".venv" .VENV_DIR}}'
  VENV_BOOTSTRAP_PYTHON: '{{default "python3.13" .VENV_BOOTSTRAP_PYTHON}}'
  TEST_RUNNER_IMAGE: '{{default "medical-platform-python-test-runner:local" .TEST_RUNNER_IMAGE}}'
  PYTEST_ARGS: '{{default "-q -s -p no:cacheprovider" .PYTEST_ARGS}}'
  DOCKER_COMPOSE: '{{default "docker compose" .DOCKER_COMPOSE}}'
  E2E_COMPOSE_FILE: '{{default "tests/e2e/docker-compose.yml" .E2E_COMPOSE_FILE}}'
  E2E_COMPOSE_PROJECT: '{{default "medical-platform-e2e" .E2E_COMPOSE_PROJECT}}'
  E2E_NETWORK: '{{default "medical-platform-e2e_default" .E2E_NETWORK}}'
  CURL_IMAGE: '{{default "curlimages/curl:8.7.1" .CURL_IMAGE}}'
  NEWMAN_IMAGE: '{{default "postman/newman:6-alpine" .NEWMAN_IMAGE}}'
  E2E_PATIENT_SERVICE_URL: '{{default "http://patient-service:8081" .E2E_PATIENT_SERVICE_URL}}'
  E2E_APPOINTMENT_SERVICE_URL: '{{default "http://appointment-service:8082" .E2E_APPOINTMENT_SERVICE_URL}}'
  E2E_PRESCRIPTION_SERVICE_URL: '{{default "http://prescription-service:8083" .E2E_PRESCRIPTION_SERVICE_URL}}'
  E2E_NOTIFICATION_SERVICE_URL: '{{default "http://notification-service:8084" .E2E_NOTIFICATION_SERVICE_URL}}'
  IMAGE_REGISTRY: '{{default "10.10.10.10:5000" .IMAGE_REGISTRY}}'
  IMAGE_NAMESPACE: '{{default "" .IMAGE_NAMESPACE}}'
  IMAGE_TAG: '{{default "latest" .IMAGE_TAG}}'
  DEV_IMAGE_REGISTRY: '{{default "localhost:5001" .DEV_IMAGE_REGISTRY}}'
  DEV_IMAGE_NAMESPACE: '{{default "" .DEV_IMAGE_NAMESPACE}}'
  DEV_IMAGE_TAG: '{{default "dev" .DEV_IMAGE_TAG}}'
  APP_SERVICES: auth-service patient-service appointment-service prescription-service notification-service payment-service
  APP_IMAGE_SERVICES: auth-service concert-service reservation-service payment-service ticket-service notification-service
  DASHBOARD_SERVICE: '{{default "dashboard" .DASHBOARD_SERVICE}}'

tasks:
  default:
    desc: Show available service commands.
    cmds:
      - task --list

  help:
    desc: Show available service commands.
    cmds:
      - task --list

  list:
    desc: Show available service commands.
    cmds:
      - task --list

  install:
    desc: Create a Python venv and install service dependencies.
    cmds:
      - |
        set -e
        python_cmd='{{.VENV_BOOTSTRAP_PYTHON}}'
        venv_dir='{{.VENV_DIR}}'
        if ! command -v "${python_cmd}" >/dev/null 2>&1; then
          printf '%s\n' "${python_cmd} command not found. Set VENV_BOOTSTRAP_PYTHON=python3 to use another interpreter." >&2
          exit 1
        fi
        "${python_cmd}" -m venv "${venv_dir}"
        venv_python="${venv_dir}/bin/python"
        if [ ! -x "${venv_python}" ]; then
          venv_python="${venv_dir}/Scripts/python.exe"
        fi
        "${venv_python}" -m pip install --upgrade pip
        "${venv_python}" -m pip install \
          -r services/auth-service/requirements.txt \
          -r services/auth-service/requirements-test.txt \
          -r services/patient-service/requirements.txt \
          -r services/patient-service/requirements-test.txt \
          -r services/appointment-service/requirements.txt \
          -r services/appointment-service/requirements-test.txt \
          -r services/prescription-service/requirements.txt \
          -r services/prescription-service/requirements-test.txt \
          -r services/notification-service/requirements.txt \
          -r services/notification-service/requirements-test.txt \
          -r services/payment-service/requirements.txt \
          -r services/payment-service/requirements-test.txt
        printf 'Python venv is ready at %s.\n' "${venv_dir}"

  test-runner-build:
    desc: Build the Docker Python test runner image.
    cmds:
      - docker build -f tests/docker/Dockerfile -t {{.TEST_RUNNER_IMAGE}} .

  test-unit:
    desc: Run FastAPI service pytest in the Docker Python runner.
    deps:
      - test-runner-build
    cmds:
      - |
        set -e
        for service in {{.APP_SERVICES}}; do
          printf '%s\n' "Running pytest for services/${service}"
          docker run --rm \
            -v "$(pwd -P)":/workspace \
            -w /workspace/services/${service} \
            {{.TEST_RUNNER_IMAGE}} \
            sh -c 'PYTHONPATH=. python -m pytest {{.PYTEST_ARGS}}'
        done

  test:
    desc: Run the default test target.
    deps:
      - test-unit

  test-all:
    desc: Run unit tests and Docker Compose E2E tests.
    cmds:
      - task test-unit
      - task test-e2e

  test-e2e:
    desc: Run PostgreSQL/MongoDB/Kafka E2E scenarios with Docker Compose.
    cmds:
      - |
        set -e
        compose_cmd='{{.DOCKER_COMPOSE}}'
        project='{{.E2E_COMPOSE_PROJECT}}'
        file='{{.E2E_COMPOSE_FILE}}'
        trap '${compose_cmd} -p "${project}" -f "${file}" down -v --remove-orphans' EXIT INT TERM
        task e2e-up
        task e2e-wait
        task e2e-newman

  e2e-up:
    desc: Start the E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.E2E_COMPOSE_PROJECT}} -f {{.E2E_COMPOSE_FILE}} up -d --build'

  e2e-wait:
    desc: Wait for E2E services with the Docker curl container.
    cmds:
      - |
        docker run --rm --network {{.E2E_NETWORK}} \
          -v "$(pwd -P)/tests/e2e/scripts":/scripts:ro \
          -e E2E_PATIENT_SERVICE_URL="{{.E2E_PATIENT_SERVICE_URL}}" \
          -e E2E_APPOINTMENT_SERVICE_URL="{{.E2E_APPOINTMENT_SERVICE_URL}}" \
          -e E2E_PRESCRIPTION_SERVICE_URL="{{.E2E_PRESCRIPTION_SERVICE_URL}}" \
          -e E2E_NOTIFICATION_SERVICE_URL="{{.E2E_NOTIFICATION_SERVICE_URL}}" \
          -e E2E_WAIT_TIMEOUT_SECONDS \
          -e E2E_WAIT_SLEEP_SECONDS \
          {{.CURL_IMAGE}} sh /scripts/wait-for-services.sh

  e2e-newman:
    desc: Run the E2E collection with the Docker Newman container.
    cmds:
      - mkdir -p tests/e2e/newman/reports
      - |
        docker run --rm --network {{.E2E_NETWORK}} \
          -v "$(pwd -P)/tests/e2e":/etc/newman \
          -w /etc/newman \
          {{.NEWMAN_IMAGE}} run postman/medical-platform.postman_collection.json \
          -e newman/docker.postman_environment.json \
          --env-var patientServiceUrl="{{.E2E_PATIENT_SERVICE_URL}}" \
          --env-var appointmentServiceUrl="{{.E2E_APPOINTMENT_SERVICE_URL}}" \
          --env-var prescriptionServiceUrl="{{.E2E_PRESCRIPTION_SERVICE_URL}}" \
          --env-var notificationServiceUrl="{{.E2E_NOTIFICATION_SERVICE_URL}}" \
          --reporters cli,junit \
          --delay-request 1000 \
          --reporter-junit-export newman/reports/e2e.xml

  e2e-down:
    desc: Stop and remove the E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.E2E_COMPOSE_PROJECT}} -f {{.E2E_COMPOSE_FILE}} down -v --remove-orphans'

  app-images-build:
    desc: Build service and dashboard Docker images.
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        if [ -z "${image_registry}" ]; then
          printf '%s\n' 'IMAGE_REGISTRY is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_tag}" ]; then
          printf '%s\n' 'IMAGE_TAG is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        for service in {{.APP_IMAGE_SERVICES}}; do
          printf 'building %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
          case "${service}" in
            concert-service|reservation-service)
              docker build -f "services/${service}/Dockerfile" -t "${image_prefix}/${service}:${image_tag}" .
              ;;
            *)
              docker build -t "${image_prefix}/${service}:${image_tag}" "services/${service}"
              ;;
          esac
        done
        printf 'building %s/%s:%s\n' "${image_prefix}" "${dashboard}" "${image_tag}"
        docker build -t "${image_prefix}/${dashboard}:${image_tag}" "${dashboard}"

  app-images-push:
    desc: Build images and push them to the registry.
    deps:
      - app-images-build
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        for service in {{.APP_IMAGE_SERVICES}} ${dashboard}; do
          printf 'pushing %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
          docker push "${image_prefix}/${service}:${image_tag}"
        done

  dev-images-build:
    desc: Build Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - task app-images-build IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} IMAGE_TAG={{.DEV_IMAGE_TAG}}

  dev-images-push:
    desc: Push Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - task app-images-push IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} IMAGE_TAG={{.DEV_IMAGE_TAG}}
