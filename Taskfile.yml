version: "3"

vars:
  VENV_DIR: '{{default ".venv" .VENV_DIR}}'
  VENV_BOOTSTRAP_PYTHON: '{{default "python3.13" .VENV_BOOTSTRAP_PYTHON}}'
  IMAGE_REGISTRY: '{{default "10.10.10.10:5000" .IMAGE_REGISTRY}}'
  IMAGE_NAMESPACE: '{{default "" .IMAGE_NAMESPACE}}'
  IMAGE_TAG: '{{default "latest" .IMAGE_TAG}}'
  DEV_IMAGE_REGISTRY: '{{default "localhost:5001" .DEV_IMAGE_REGISTRY}}'
  DEV_IMAGE_NAMESPACE: '{{default "" .DEV_IMAGE_NAMESPACE}}'
  DEV_IMAGE_TAG: '{{default "dev" .DEV_IMAGE_TAG}}'
  APP_SERVICES: auth-service concert-service notification-service payment-service reservation-service ticket-service
  APP_IMAGE_SERVICES: auth-service concert-service reservation-service payment-service ticket-service notification-service
  DASHBOARD_SERVICE: '{{default "dashboard" .DASHBOARD_SERVICE}}'

includes:
  tests:
    taskfile: ./tests/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available service commands.
    cmds:
      - task --list

  help:
    desc: Show available service commands.
    cmds:
      - task --list

  list:
    desc: Show available service commands.
    cmds:
      - task --list

  install:
    desc: Create a Python venv and install service dependencies.
    cmds:
      - |
        set -e
        python_cmd='{{.VENV_BOOTSTRAP_PYTHON}}'
        venv_dir='{{.VENV_DIR}}'
        if ! command -v "${python_cmd}" >/dev/null 2>&1; then
          printf '%s\n' "${python_cmd} command not found. Set VENV_BOOTSTRAP_PYTHON=python3 to use another interpreter." >&2
          exit 1
        fi
        "${python_cmd}" -m venv "${venv_dir}"
        venv_python="${venv_dir}/bin/python"
        if [ ! -x "${venv_python}" ]; then
          venv_python="${venv_dir}/Scripts/python.exe"
        fi
        "${venv_python}" -m pip install --upgrade pip
        "${venv_python}" -m pip install \
          -e packages/contracts \
          -r services/auth-service/requirements.txt \
          -r services/auth-service/requirements-test.txt \
          -r services/patient-service/requirements.txt \
          -r services/patient-service/requirements-test.txt \
          -r services/appointment-service/requirements.txt \
          -r services/appointment-service/requirements-test.txt \
          -r services/prescription-service/requirements.txt \
          -r services/prescription-service/requirements-test.txt \
          -r services/notification-service/requirements.txt \
          -r services/notification-service/requirements-test.txt \
          -r services/payment-service/requirements.txt \
          -r services/payment-service/requirements-test.txt \
          -r services/ticket-service/requirements.txt \
          -r services/ticket-service/requirements-test.txt
        printf 'Python venv is ready at %s.\n' "${venv_dir}"

  test-runner-build:
    desc: Build the Docker Python test runner image.
    cmds:
      - task: tests:test-runner-build

  test-service:
    desc: Run one service pytest in the Docker Python runner with SERVICE=<service-name>.
    cmds:
      - task: tests:test-service
        vars:
          SERVICE: '{{default "" .SERVICE}}'

  test-services:
    desc: Run selected service pytest suites in parallel with SERVICES="<service-names>".
    cmds:
      - task: tests:test-services
        vars:
          SERVICES: '{{default "" .SERVICES}}'

  test-unit:
    desc: Run all managed service pytest suites in the Docker Python runner.
    cmds:
      - task: tests:test-unit

  test:
    desc: Run the default test target.
    cmds:
      - task: tests:test-unit

  test-all:
    desc: Run unit tests and Docker Compose E2E tests.
    cmds:
      - task: tests:test-unit
      - task: tests:test-e2e

  test-e2e:
    desc: Run Docker Compose E2E tests. Optionally set SCENARIO=<scenario-name>.
    cmds:
      - task: tests:test-e2e
        vars:
          SCENARIO: '{{default "" .SCENARIO}}'

  app-images-build:
    desc: Build service and dashboard Docker images.
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        if [ -z "${image_registry}" ]; then
          printf '%s\n' 'IMAGE_REGISTRY is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_tag}" ]; then
          printf '%s\n' 'IMAGE_TAG is required, for example: task app-images-build IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        build_image() {
          service="$1"
          printf 'building %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
          case "${service}" in
            concert-service|reservation-service|payment-service|ticket-service|notification-service)
              docker build -f "services/${service}/Dockerfile" -t "${image_prefix}/${service}:${image_tag}" .
              ;;
            "${dashboard}")
              docker build -t "${image_prefix}/${service}:${image_tag}" "${dashboard}"
              ;;
            *)
              docker build -t "${image_prefix}/${service}:${image_tag}" "services/${service}"
              ;;
          esac
        }
        pids=""
        for service in {{.APP_IMAGE_SERVICES}}; do
          build_image "${service}" &
          pids="${pids} $!"
        done
        build_image "${dashboard}" &
        pids="${pids} $!"
        failed=0
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        if [ "${failed}" -ne 0 ]; then
          exit 1
        fi

  app-images-push:
    desc: Build images and push them to the registry.
    deps:
      - app-images-build
    cmds:
      - |
        set -eu
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        pids=""
        for service in {{.APP_IMAGE_SERVICES}} ${dashboard}; do
          (
            printf 'pushing %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
            docker push "${image_prefix}/${service}:${image_tag}"
          ) &
          pids="${pids} $!"
        done
        failed=0
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        if [ "${failed}" -ne 0 ]; then
          exit 1
        fi

  app-image-build:
    desc: Build one service or dashboard Docker image with SERVICE=<image-name>.
    cmds:
      - |
        set -eu
        requested='{{default "" .SERVICE}}'
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        if [ -z "${requested}" ]; then
          printf '%s\n' 'SERVICE is required, for example: task app-image-build SERVICE=concert-service IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_registry}" ]; then
          printf '%s\n' 'IMAGE_REGISTRY is required, for example: task app-image-build SERVICE=concert-service IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        if [ -z "${image_tag}" ]; then
          printf '%s\n' 'IMAGE_TAG is required, for example: task app-image-build SERVICE=concert-service IMAGE_REGISTRY=localhost:5001 IMAGE_TAG=dev' >&2
          exit 2
        fi
        normalize_service() {
          raw="$1"
          if [ "${raw}" = "${dashboard}" ]; then
            printf '%s\n' "${raw}"
            return 0
          fi
          for candidate in {{.APP_IMAGE_SERVICES}}; do
            if [ "${raw}" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
            if [ "${raw}-service" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
          done
          return 1
        }
        if ! service="$(normalize_service "${requested}")"; then
          printf 'Unknown SERVICE=%s (expected one of: {{.APP_IMAGE_SERVICES}} %s).\n' "${requested}" "${dashboard}" >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        printf 'building %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
        case "${service}" in
          concert-service|reservation-service|payment-service|ticket-service|notification-service)
            docker build -f "services/${service}/Dockerfile" -t "${image_prefix}/${service}:${image_tag}" .
            ;;
          "${dashboard}")
            docker build -t "${image_prefix}/${service}:${image_tag}" "${dashboard}"
            ;;
          *)
            docker build -t "${image_prefix}/${service}:${image_tag}" "services/${service}"
            ;;
        esac

  app-image-push:
    desc: Build and push one service or dashboard Docker image with SERVICE=<image-name>.
    cmds:
      - task app-image-build SERVICE={{.SERVICE}} IMAGE_REGISTRY={{.IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.IMAGE_NAMESPACE}} IMAGE_TAG={{.IMAGE_TAG}}
      - |
        set -eu
        requested='{{default "" .SERVICE}}'
        image_registry='{{.IMAGE_REGISTRY}}'
        image_namespace='{{.IMAGE_NAMESPACE}}'
        image_tag='{{.IMAGE_TAG}}'
        dashboard='{{.DASHBOARD_SERVICE}}'
        normalize_service() {
          raw="$1"
          if [ "${raw}" = "${dashboard}" ]; then
            printf '%s\n' "${raw}"
            return 0
          fi
          for candidate in {{.APP_IMAGE_SERVICES}}; do
            if [ "${raw}" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
            if [ "${raw}-service" = "${candidate}" ]; then
              printf '%s\n' "${candidate}"
              return 0
            fi
          done
          return 1
        }
        if ! service="$(normalize_service "${requested}")"; then
          printf 'Unknown SERVICE=%s (expected one of: {{.APP_IMAGE_SERVICES}} %s).\n' "${requested}" "${dashboard}" >&2
          exit 2
        fi
        image_prefix="${image_registry}"
        if [ -n "${image_namespace}" ]; then
          image_prefix="${image_registry%/}/${image_namespace#/}"
        fi
        printf 'pushing %s/%s:%s\n' "${image_prefix}" "${service}" "${image_tag}"
        docker push "${image_prefix}/${service}:${image_tag}"

  dev-images-build:
    desc: Build Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - task app-images-build IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} IMAGE_TAG={{.DEV_IMAGE_TAG}}

  dev-images-push:
    desc: Push Docker Desktop dev images with DEV_IMAGE_* variables.
    cmds:
      - task app-images-push IMAGE_REGISTRY={{.DEV_IMAGE_REGISTRY}} IMAGE_NAMESPACE={{.DEV_IMAGE_NAMESPACE}} IMAGE_TAG={{.DEV_IMAGE_TAG}}
