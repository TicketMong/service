name: Image Build

# 이 workflow는 PR 또는 수동 실행에서 Docker image build 가능 여부만 검증한다.
# 단위 테스트 결과는 Service Tests workflow가 따로 담당하고, 이 workflow는 registry push를 하지 않는다.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - '.dockerignore'
      - '.github/workflows/image-build.yml'
      - '.github/workflows/image-publish.yml'
  workflow_dispatch:
    inputs:
      image:
        description: build할 이미지
        required: true
        type: choice
        default: all
        options:
          - all
          - auth-service
          - concert-service
          - reservation-service
          - payment-service
          - ticket-service
          - notification-service

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: image-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ci.local
  IMAGE_TAG: ${{ github.sha }}
  DOCKER_BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  detect-images:
    name: Detect image build scope
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            concert-service:
              - 'services/concert-service/**'
            notification-service:
              - 'services/notification-service/**'
            payment-service:
              - 'services/payment-service/**'
            reservation-service:
              - 'services/reservation-service/**'
            ticket-service:
              - 'services/ticket-service/**'
            image-common:
              - 'packages/**'
              - 'Taskfile.yml'
              - '.github/workflows/image-build.yml'
              - '.github/workflows/image-publish.yml'

      - name: Build image matrix
        id: matrix
        shell: bash
        env:
          REQUESTED_IMAGE: ${{ github.event.inputs.image || 'all' }}
        run: |
          set -euo pipefail
          all_images='["auth-service","concert-service","reservation-service","payment-service","ticket-service","notification-service"]'
          changed='${{ steps.changes.outputs.changes }}'
          image_filters='["auth-service","concert-service","notification-service","payment-service","reservation-service","ticket-service"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${REQUESTED_IMAGE}" = "all" ]; then
              images="${all_images}"
            else
              images="$(jq -c --arg requested "${REQUESTED_IMAGE}" 'map(select(. == $requested))' <<<"${all_images}")"
            fi
          elif [ "${{ steps.changes.outputs['image-common'] }}" = "true" ]; then
            images="${all_images}"
          else
            images="$(jq -c --argjson allowed "${image_filters}" '[.[] | select(. as $name | $allowed | index($name))]' <<<"${changed}")"
          fi

          image_count="$(jq 'length' <<<"${images}")"
          if [ "${image_count}" = "0" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '알 수 없는 이미지 선택값입니다: %s\n' "${REQUESTED_IMAGE}" >&2
            exit 2
          fi

          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf 'Selected images: %s\n' "${images}"

  build:
    name: Image build (${{ matrix.image }})
    needs: detect-images
    if: needs.detect-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect-images.outputs.images) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        shell: bash
        env:
          DOCKER_BUILD_CACHE_FROM: |
            type=gha,scope=${{ matrix.image }}-linux-amd64
            type=gha,scope=${{ matrix.image }}-linux-arm64
          DOCKER_BUILD_CACHE_TO: |
            type=gha,scope=${{ matrix.image }}-linux-amd64,mode=max
            type=gha,scope=${{ matrix.image }}-linux-arm64,mode=max
        run: |
          set -euo pipefail
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            DOCKER_BUILD_PLATFORMS="${DOCKER_BUILD_PLATFORMS}" \
            DOCKER_BUILD_CACHE_FROM="${DOCKER_BUILD_CACHE_FROM}" \
            DOCKER_BUILD_CACHE_TO="${DOCKER_BUILD_CACHE_TO}"

      - name: Append image build summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          image="${IMAGE_REGISTRY}/${{ matrix.image }}:${IMAGE_TAG}"
          if docker image inspect "${image}" >/tmp/image-inspect.json 2>/dev/null; then
            image_id="$(jq -r '.[0].Id' /tmp/image-inspect.json)"
            {
              printf '### Docker image build\n\n'
              printf -- '- image: `%s`\n' "${image}"
              printf -- '- local image id: `%s`\n' "${image_id}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

  no-image-build:
    name: No image build
    needs: detect-images
    if: needs.detect-images.outputs.image_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: Report no-op
        run: echo "No Docker images selected for this change."
