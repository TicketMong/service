name: Image Publish

# 이 workflow는 `main` 반영 또는 수동 실행 때 이미지 publish 정식 단계를 수행한다.
# 처리 흐름: 이미지 목록 결정 -> ECR 로그인 -> 이미지 빌드 -> 이미지 push -> digest 수집 -> deploy-plan artifact 생성 -> gitops values 업데이트.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        description: publish할 이미지
        required: true
        type: choice
        default: all
        options:
          - all
          - auth-service
          - concert-service
          - reservation-service
          - payment-service
          - ticket-service
          - notification-service

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ap-northeast-2

jobs:
  select-images:
    name: 이미지 선택
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}

    steps:
      - name: 이미지 matrix 생성
        id: matrix
        shell: bash
        env:
          REQUESTED_IMAGE: ${{ github.event.inputs.image || 'all' }}
        run: |
          set -euo pipefail
          all_images='["auth-service","concert-service","reservation-service","payment-service","ticket-service","notification-service"]'

          images="$(jq -c --arg requested "${REQUESTED_IMAGE}" '
            if $requested == "all" then
              .
            else
              map(select(. == $requested))
            end
          ' <<<"${all_images}")"
          image_count="$(jq 'length' <<<"${images}")"

          if [ "${image_count}" = "0" ]; then
            printf '알 수 없는 이미지 선택값입니다: %s\n' "${REQUESTED_IMAGE}" >&2
            exit 2
          fi

          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf '선택된 이미지: %s\n' "${images}"

  publish:
    name: 이미지 publish (${{ matrix.image }})
    needs: select-images
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.select-images.outputs.images) }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4

      - name: Task 설치
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941141115079:role/github-actions-ecr-role
          aws-region: ap-northeast-2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          pwd
          ls
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${IMAGE_TAG}"


      - name: digest 수집 및 deploy plan 작성
        id: deploy-plan
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          image_ref="${IMAGE_REGISTRY}/${image}:${IMAGE_TAG}"

          digest=""
          digest_source=""
          digest="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${image}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          digest_source="ecr-api"

          if [ -z "${digest}" ]; then
            printf 'push된 이미지 digest를 확인할 수 없습니다: %s\n' "${image_ref}" >&2
            exit 1
          fi

          mkdir -p deploy-plan
          jq -n \
            --arg image "${image}" \
            --arg tag "${IMAGE_TAG}" \
            --arg image_ref "${image_ref}" \
            --arg digest "${digest}" \
            --arg digest_ref "${IMAGE_REGISTRY}/${image}@${digest}" \
            --arg digest_source "${digest_source}" \
            --arg source_sha "${GITHUB_SHA}" \
            '{
              image: $image,
              tag: $tag,
              image_ref: $image_ref,
              digest: $digest,
              digest_ref: $digest_ref,
              digest_source: $digest_source,
              source_sha: $source_sha,
              gitops_action: "updated"
            }' > "deploy-plan/${image}.json"

          {
            printf '### 이미지 publish\n\n'
            printf -- '- 이미지: `%s`\n' "${image}"
            printf -- '- 태그 참조: `%s`\n' "${image_ref}"
            printf -- '- digest 참조: `%s`\n' "${IMAGE_REGISTRY}/${image}@${digest}"
            printf -- '- digest 출처: `%s`\n' "${digest_source}"
            printf -- '- GitOps 작업: `updated`\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 이미지별 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: deploy-plan-${{ matrix.image }}
          path: deploy-plan/${{ matrix.image }}.json
          if-no-files-found: error

  deploy-plan:
    name: deploy plan 조립 및 gitops 업데이트
    needs:
      - select-images
      - publish
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: 이미지별 deploy plan 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-plan-*
          path: deploy-plan
          merge-multiple: true

      - name: 통합 deploy plan 작성
        shell: bash
        run: |
          set -euo pipefail
          jq -s 'sort_by(.image)' deploy-plan/*.json > deploy-plan.json

          {
            printf '# 이미지 publish deploy plan\n\n'
            printf -- '- 소스 commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- registry: `%s`\n' "${IMAGE_REGISTRY}"
            printf -- '- GitOps 작업: `updated`\n\n'
            printf '| 이미지 | 태그 참조 | digest 참조 |\n'
            printf '| --- | --- | --- |\n'
            jq -r '.[] | "| `\(.image)` | `\(.image_ref)` | `\(.digest_ref)` |"' deploy-plan.json
          } > deploy-plan.md

          cat deploy-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: 통합 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: image-publish-deploy-plan
          path: |
            deploy-plan.json
            deploy-plan.md
          if-no-files-found: error

      - name: gitops repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: Medikong/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: gitops values 이미지 태그 업데이트
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          jq -r '.[] | "\(.image) \(.tag)"' ../deploy-plan.json | while read -r image tag; do
            service_file="values/services/${image%-service}.yaml"
            if [ ! -f "${service_file}" ]; then
              service_file="values/services/${image}.yaml"
            fi

            if [ -f "${service_file}" ]; then
              sed -i "s|tag:.*|tag: ${tag}|g" "${service_file}"
              printf 'updated: %s -> %s\n' "${service_file}" "${tag}"
            else
              printf 'skip: %s not found\n' "${service_file}"
            fi
          done

      - name: gitops repo push
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          if git diff --quiet; then
            printf 'no changes to commit\n'
            exit 0
          fi

          git add values/services/
          git commit -m "chore: update image tags to ${GITHUB_SHA}"
          git push
