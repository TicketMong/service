name: Image Publish

# 이 workflow는 배포용 Git tag push 때만 서비스 이미지를 build/push하고 GitOps values를 업데이트한다.
# 처리 흐름: deploy tag 해석 -> 이미지 matrix 생성 -> ECR 로그인 -> 이미지 build/push -> digest 수집 -> deploy-plan artifact 생성 -> gitops values 업데이트.

on:
  push:
    tags:
      - 'deploy/dev/auth-service/v*.*.*'
      - 'deploy/dev/concert-service/v*.*.*'
      - 'deploy/dev/reservation-service/v*.*.*'
      - 'deploy/dev/payment-service/v*.*.*'
      - 'deploy/dev/ticket-service/v*.*.*'
      - 'deploy/dev/notification-service/v*.*.*'
      - 'deploy/dev/changed/*.*.*-*'
      - 'deploy/dev/all/*.*.*-*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  AWS_REGION: ap-northeast-2
  DOCKER_BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  select-images:
    name: deploy tag 이미지 선택
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}
      deploy_environment: ${{ steps.matrix.outputs.deploy_environment }}
      deploy_target: ${{ steps.matrix.outputs.deploy_target }}
      deploy_tag: ${{ steps.matrix.outputs.deploy_tag }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: deploy tag matrix 생성
        id: matrix
        shell: bash
        env:
          DEPLOY_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          all_images='["auth-service","concert-service","reservation-service","payment-service","ticket-service","notification-service"]'

          IFS=/ read -r deploy_prefix deploy_environment deploy_target deploy_value deploy_extra <<EOF
          ${DEPLOY_TAG}
          EOF

          if [ "${deploy_prefix}" != "deploy" ] || [ "${deploy_environment}" != "dev" ] || [ -n "${deploy_extra:-}" ]; then
            printf '지원하지 않는 deploy tag입니다: %s\n' "${DEPLOY_TAG}" >&2
            exit 2
          fi

          case "${deploy_target}" in
            auth-service|concert-service|reservation-service|payment-service|ticket-service|notification-service)
              if ! [[ "${deploy_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                printf '서비스 deploy tag의 버전이 SemVer가 아닙니다: %s\n' "${DEPLOY_TAG}" >&2
                exit 2
              fi
              images="$(jq -nc --arg image "${deploy_target}" --arg tag "${deploy_value}" '[{image: $image, tag: $tag}]')"
              ;;
            changed|all)
              git fetch --tags --force
              tag_contents="$(git for-each-ref "refs/tags/${DEPLOY_TAG}" --format='%(contents)')"
              if ! jq -e . >/dev/null <<<"${tag_contents}"; then
                printf 'deploy plan annotation이 JSON이 아닙니다: %s\n' "${DEPLOY_TAG}" >&2
                exit 2
              fi

              jq -e \
                --arg environment "${deploy_environment}" \
                --arg target "${deploy_target}" \
                --arg deploy_tag "${DEPLOY_TAG}" \
                --argjson allowed "${all_images}" \
                '
                  .schema_version == 1
                  and .environment == $environment
                  and .target == $target
                  and .deploy_tag == $deploy_tag
                  and (.services | type == "array")
                  and (.services | length > 0)
                  and all(.services[]; . as $service |
                    ($service.image | type == "string")
                    and ($service.tag | type == "string")
                    and ($service.tag | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))
                    and ($allowed | index($service.image))
                  )
                  and (
                    if $target == "all" then
                      ((.services | map(.image) | sort) == ($allowed | sort))
                    else
                      true
                    end
                  )
                ' <<<"${tag_contents}" >/dev/null

              images="$(jq -c '.services | map({image, tag})' <<<"${tag_contents}")"
              ;;
            *)
              printf '지원하지 않는 deploy target입니다: %s\n' "${deploy_target}" >&2
              exit 2
              ;;
          esac

          image_count="$(jq 'length' <<<"${images}")"
          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_environment=%s\n' "${deploy_environment}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_target=%s\n' "${deploy_target}" >> "${GITHUB_OUTPUT}"
          printf 'deploy_tag=%s\n' "${DEPLOY_TAG}" >> "${GITHUB_OUTPUT}"
          printf '선택된 이미지: %s\n' "${images}"

  publish:
    name: 이미지 publish (${{ matrix.image }}:${{ matrix.tag }})
    needs: select-images
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.select-images.outputs.images) }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4

      - name: Task 설치
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941141115079:role/github-actions-ecr-role
          aws-region: ap-northeast-2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          DOCKER_BUILD_CACHE_FROM: |
            type=gha,scope=${{ matrix.image }}-linux-amd64
            type=gha,scope=${{ matrix.image }}-linux-arm64
          DOCKER_BUILD_CACHE_TO: |
            type=gha,scope=${{ matrix.image }}-linux-amd64,mode=max
            type=gha,scope=${{ matrix.image }}-linux-arm64,mode=max
        run: |
          set -euo pipefail
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${{ matrix.tag }}" \
            DOCKER_BUILD_PLATFORMS="${DOCKER_BUILD_PLATFORMS}" \
            DOCKER_BUILD_CACHE_FROM="${DOCKER_BUILD_CACHE_FROM}" \
            DOCKER_BUILD_CACHE_TO="${DOCKER_BUILD_CACHE_TO}"

      - name: digest 수집 및 deploy plan 작성
        id: deploy-plan
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          tag="${{ matrix.tag }}"
          image_ref="${IMAGE_REGISTRY}/${image}:${tag}"

          digest="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${image}" \
            --image-ids imageTag="${tag}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"

          if [ -z "${digest}" ] || [ "${digest}" = "None" ]; then
            printf 'push된 이미지 digest를 확인할 수 없습니다: %s\n' "${image_ref}" >&2
            exit 1
          fi

          mkdir -p deploy-plan
          jq -n \
            --arg image "${image}" \
            --arg tag "${tag}" \
            --arg image_ref "${image_ref}" \
            --arg digest "${digest}" \
            --arg digest_ref "${IMAGE_REGISTRY}/${image}@${digest}" \
            --arg deploy_tag "${{ needs.select-images.outputs.deploy_tag }}" \
            --arg deploy_target "${{ needs.select-images.outputs.deploy_target }}" \
            --arg deploy_environment "${{ needs.select-images.outputs.deploy_environment }}" \
            --arg source_sha "${GITHUB_SHA}" \
            '{
              image: $image,
              tag: $tag,
              image_ref: $image_ref,
              digest: $digest,
              digest_ref: $digest_ref,
              digest_source: "ecr-api",
              deploy_tag: $deploy_tag,
              deploy_target: $deploy_target,
              deploy_environment: $deploy_environment,
              source_sha: $source_sha,
              gitops_action: "updated"
            }' > "deploy-plan/${image}.json"

          {
            printf '### 이미지 publish\n\n'
            printf -- '- 이미지: `%s`\n' "${image}"
            printf -- '- 태그 참조: `%s`\n' "${image_ref}"
            printf -- '- digest 참조: `%s`\n' "${IMAGE_REGISTRY}/${image}@${digest}"
            printf -- '- deploy tag: `%s`\n' "${{ needs.select-images.outputs.deploy_tag }}"
            printf -- '- GitOps 작업: `updated`\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 이미지별 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: deploy-plan-${{ matrix.image }}
          path: deploy-plan/${{ matrix.image }}.json
          if-no-files-found: error

  deploy-plan:
    name: deploy plan 조립 및 gitops 업데이트
    needs:
      - select-images
      - publish
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: 이미지별 deploy plan 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-plan-*
          path: deploy-plan
          merge-multiple: true

      - name: 통합 deploy plan 작성
        shell: bash
        run: |
          set -euo pipefail
          jq -s 'sort_by(.image)' deploy-plan/*.json > deploy-plan.json

          {
            printf '# 이미지 publish deploy plan\n\n'
            printf -- '- deploy tag: `%s`\n' "${{ needs.select-images.outputs.deploy_tag }}"
            printf -- '- deploy target: `%s`\n' "${{ needs.select-images.outputs.deploy_target }}"
            printf -- '- 소스 commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- registry: `%s`\n' "${IMAGE_REGISTRY}"
            printf -- '- GitOps 작업: `updated`\n\n'
            printf '| 이미지 | 태그 참조 | digest 참조 |\n'
            printf '| --- | --- | --- |\n'
            jq -r '.[] | "| `\(.image)` | `\(.image_ref)` | `\(.digest_ref)` |"' deploy-plan.json
          } > deploy-plan.md

          cat deploy-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: 통합 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: image-publish-deploy-plan
          path: |
            deploy-plan.json
            deploy-plan.md
          if-no-files-found: error

      - name: gitops repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: Medikong/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: gitops values 이미지 태그 업데이트
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          while IFS= read -r item; do
            image="$(jq -r '.image' <<<"${item}")"
            tag="$(jq -r '.tag' <<<"${item}")"
            service_file="values/services/${image%-service}.yaml"

            if [ ! -f "${service_file}" ]; then
              printf 'GitOps values 파일을 찾을 수 없습니다: %s\n' "${service_file}" >&2
              exit 1
            fi

            python3 - "${service_file}" "${tag}" <<'PY'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          tag = sys.argv[2]
          lines = path.read_text().splitlines(keepends=True)
          in_image = False
          updated = False

          for index, line in enumerate(lines):
              if line == "image:\n" or line == "image:":
                  in_image = True
                  continue
              if in_image and line and not line.startswith(" "):
                  in_image = False
              if in_image and line.startswith("  tag:"):
                  newline = "\n" if line.endswith("\n") else ""
                  lines[index] = f"  tag: {tag}{newline}"
                  updated = True
                  break

          if not updated:
              raise SystemExit(f"image.tag field not found: {path}")

          path.write_text("".join(lines))
          PY
            printf 'updated: %s -> %s\n' "${service_file}" "${tag}"
          done < <(jq -c '.[]' ../deploy-plan.json)

      - name: gitops repo push
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          if git diff --quiet; then
            printf 'no changes to commit\n'
            exit 0
          fi

          git add values/services/
          git commit -m "chore: deploy images for ${{ needs.select-images.outputs.deploy_tag }}"
          git push

      - name: Discord 배포 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "이미지 배포 완료"
          description: "배포 태그: ${{ needs.select-images.outputs.deploy_tag }}"
          color: 0x00ff00

  no-image-publish:
    name: 이미지 publish 없음
    needs: select-images
    if: needs.select-images.outputs.image_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: no-op 보고
        run: echo "이번 deploy tag에서 publish할 Docker 이미지가 없습니다."
