name: Image Publish

# мқҙ workflowлҠ” `main` л°ҳмҳҒ лҳҗлҠ” мҲҳлҸҷ мӢӨн–ү л•Ң мқҙлҜём§Җ publish м •мӢқ лӢЁкі„лҘј мҲҳн–үн•ңлӢӨ.
# мІҳлҰ¬ нқҗлҰ„: мқҙлҜём§Җ лӘ©лЎқ кІ°м • -> ECR лЎңк·ёмқё -> мқҙлҜём§Җ л№Ңл“ң -> мқҙлҜём§Җ push -> digest мҲҳм§‘ -> deploy-plan artifact мғқм„ұ -> gitops values м—…лҚ°мқҙнҠё.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        description: publishн•  мқҙлҜём§Җ
        required: true
        type: choice
        default: all
        options:
          - all
          - auth-service
          - concert-service
          - reservation-service
          - payment-service
          - ticket-service
          - notification-service

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ap-northeast-2

jobs:
  select-images:
    name: мқҙлҜём§Җ м„ нғқ
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}

    steps:
      - name: мқҙлҜём§Җ matrix мғқм„ұ
        id: matrix
        shell: bash
        env:
          REQUESTED_IMAGE: ${{ github.event.inputs.image || 'all' }}
        run: |
          set -euo pipefail
          all_images='["auth-service","concert-service","reservation-service","payment-service","ticket-service","notification-service"]'

          images="$(jq -c --arg requested "${REQUESTED_IMAGE}" '
            if $requested == "all" then
              .
            else
              map(select(. == $requested))
            end
          ' <<<"${all_images}")"
          image_count="$(jq 'length' <<<"${images}")"

          if [ "${image_count}" = "0" ]; then
            printf 'м•Ң мҲҳ м—ҶлҠ” мқҙлҜём§Җ м„ нғқк°’мһ…лӢҲлӢӨ: %s\n' "${REQUESTED_IMAGE}" >&2
            exit 2
          fi

          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf 'м„ нғқлҗң мқҙлҜём§Җ: %s\n' "${images}"

  publish:
    name: мқҙлҜём§Җ publish (${{ matrix.image }})
    needs: select-images
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.select-images.outputs.images) }}

    steps:
      - name: мҶҢмҠӨ лӮҙл Өл°ӣкё°
        uses: actions/checkout@v4

      - name: Task м„Өм№ҳ
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: AWS мқёмҰқ (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941141115079:role/github-actions-ecr-role
          aws-region: ap-northeast-2

      - name: ECR лЎңк·ёмқё
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker мқҙлҜём§Җ л№Ңл“ң
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          pwd
          ls
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${IMAGE_TAG}"

      - name: Docker мқҙлҜём§Җ push
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REGISTRY}/${{ matrix.image }}:${IMAGE_TAG}"
          docker push "${image_ref}"

      - name: digest мҲҳм§‘ л°Ҹ deploy plan мһ‘м„ұ
        id: deploy-plan
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          image_ref="${IMAGE_REGISTRY}/${image}:${IMAGE_TAG}"

          repo_digest="$(docker image inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' "${image_ref}" | head -n 1 || true)"
          digest=""
          digest_source=""
          if [ -n "${repo_digest}" ]; then
            digest="${repo_digest##*@}"
            digest_source="RepoDigests"
          else
            digest="$(curl -fsSI \
              -H 'Accept: application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.manifest.v1+json' \
              "http://${IMAGE_REGISTRY}/v2/${image}/manifests/${IMAGE_TAG}" \
              | awk -F': ' 'tolower($1) == "docker-content-digest" { gsub("\r", "", $2); print $2; exit }')"
            digest_source="registry-head"
          fi

          if [ -z "${digest}" ]; then
            printf 'pushлҗң мқҙлҜём§Җ digestлҘј нҷ•мқён•  мҲҳ м—ҶмҠөлӢҲлӢӨ: %s\n' "${image_ref}" >&2
            exit 1
          fi

          mkdir -p deploy-plan
          jq -n \
            --arg image "${image}" \
            --arg tag "${IMAGE_TAG}" \
            --arg image_ref "${image_ref}" \
            --arg digest "${digest}" \
            --arg digest_ref "${IMAGE_REGISTRY}/${image}@${digest}" \
            --arg digest_source "${digest_source}" \
            --arg source_sha "${GITHUB_SHA}" \
            '{
              image: $image,
              tag: $tag,
              image_ref: $image_ref,
              digest: $digest,
              digest_ref: $digest_ref,
              digest_source: $digest_source,
              source_sha: $source_sha,
              gitops_action: "updated"
            }' > "deploy-plan/${image}.json"

          {
            printf '### мқҙлҜём§Җ publish\n\n'
            printf -- '- мқҙлҜём§Җ: `%s`\n' "${image}"
            printf -- '- нғңк·ё м°ёмЎ°: `%s`\n' "${image_ref}"
            printf -- '- digest м°ёмЎ°: `%s`\n' "${IMAGE_REGISTRY}/${image}@${digest}"
            printf -- '- digest м¶ңмІҳ: `%s`\n' "${digest_source}"
            printf -- '- GitOps мһ‘м—…: `updated`\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: мқҙлҜём§Җлі„ deploy plan м—…лЎңл“ң
        uses: actions/upload-artifact@v4
        with:
          name: deploy-plan-${{ matrix.image }}
          path: deploy-plan/${{ matrix.image }}.json
          if-no-files-found: error

  deploy-plan:
    name: deploy plan мЎ°лҰҪ л°Ҹ gitops м—…лҚ°мқҙнҠё
    needs:
      - select-images
      - publish
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: мқҙлҜём§Җлі„ deploy plan лӢӨмҡҙлЎңл“ң
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-plan-*
          path: deploy-plan
          merge-multiple: true

      - name: нҶөн•© deploy plan мһ‘м„ұ
        shell: bash
        run: |
          set -euo pipefail
          jq -s 'sort_by(.image)' deploy-plan/*.json > deploy-plan.json

          {
            printf '# мқҙлҜём§Җ publish deploy plan\n\n'
            printf -- '- мҶҢмҠӨ commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- registry: `%s`\n' "${IMAGE_REGISTRY}"
            printf -- '- GitOps мһ‘м—…: `updated`\n\n'
            printf '| мқҙлҜём§Җ | нғңк·ё м°ёмЎ° | digest м°ёмЎ° |\n'
            printf '| --- | --- | --- |\n'
            jq -r '.[] | "| `\(.image)` | `\(.image_ref)` | `\(.digest_ref)` |"' deploy-plan.json
          } > deploy-plan.md

          cat deploy-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: нҶөн•© deploy plan м—…лЎңл“ң
        uses: actions/upload-artifact@v4
        with:
          name: image-publish-deploy-plan
          path: |
            deploy-plan.json
            deploy-plan.md
          if-no-files-found: error

      - name: gitops repo мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4
        with:
          repository: Medikong/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: gitops values мқҙлҜём§Җ нғңк·ё м—…лҚ°мқҙнҠё
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          jq -r '.[] | "\(.image) \(.tag)"' ../deploy-plan.json | while read -r image tag; do
            service_file="values/services/${image%-service}.yaml"
            if [ ! -f "${service_file}" ]; then
              service_file="values/services/${image}.yaml"
            fi

            if [ -f "${service_file}" ]; then
              sed -i "s|tag:.*|tag: ${tag}|g" "${service_file}"
              printf 'updated: %s -> %s\n' "${service_file}" "${tag}"
            else
              printf 'skip: %s not found\n' "${service_file}"
            fi
          done

      - name: gitops repo push
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          if git diff --quiet; then
            printf 'no changes to commit\n'
            exit 0
          fi

          git add values/services/
          git commit -m "chore: update image tags to ${GITHUB_SHA}"
          git push
