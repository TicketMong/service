name: Image Publish

# 이 workflow는 `main` 반영 또는 수동 실행 때 이미지 publish 정식 단계를 수행한다.
# main push는 변경된 서비스만 publish하고, 수동 실행은 전체 또는 특정 이미지를 선택할 수 있다.
# 처리 흐름: 이미지 목록 결정 -> ECR 로그인 -> 이미지 빌드 -> 이미지 push -> digest 수집 -> deploy-plan artifact 생성 -> gitops values 업데이트.

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - '.dockerignore'
      - '.github/workflows/image-publish.yml'
  workflow_dispatch:
    inputs:
      image:
        description: publish할 이미지
        required: true
        type: choice
        default: all
        options:
          - all
          - auth-service
          - concert-service
          - reservation-service
          - payment-service
          - ticket-service
          - notification-service

permissions:
  contents: read
  id-token: write

concurrency:
  group: image-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ap-northeast-2
  DOCKER_BUILD_PLATFORMS: linux/amd64,linux/arm64

jobs:
  select-images:
    name: 이미지 선택
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.matrix.outputs.images }}
      image_count: ${{ steps.matrix.outputs.image_count }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 변경 경로 감지
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            concert-service:
              - 'services/concert-service/**'
            notification-service:
              - 'services/notification-service/**'
            payment-service:
              - 'services/payment-service/**'
            reservation-service:
              - 'services/reservation-service/**'
            ticket-service:
              - 'services/ticket-service/**'
            image-common:
              - 'packages/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Taskfile.yml'
              - '.dockerignore'
              - '.github/workflows/image-publish.yml'

      - name: 이미지 matrix 생성
        id: matrix
        shell: bash
        env:
          REQUESTED_IMAGE: ${{ github.event.inputs.image || 'all' }}
        run: |
          set -euo pipefail
          all_images='["auth-service","concert-service","reservation-service","payment-service","ticket-service","notification-service"]'
          changed='${{ steps.changes.outputs.changes }}'
          image_filters='["auth-service","concert-service","notification-service","payment-service","reservation-service","ticket-service"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            images="$(jq -c --arg requested "${REQUESTED_IMAGE}" '
              if $requested == "all" then
                .
              else
                map(select(. == $requested))
              end
            ' <<<"${all_images}")"
          elif [ "${{ steps.changes.outputs['image-common'] }}" = "true" ]; then
            images="${all_images}"
          else
            images="$(jq -c --argjson allowed "${image_filters}" '[.[] | select(. as $name | $allowed | index($name))]' <<<"${changed}")"
          fi

          image_count="$(jq 'length' <<<"${images}")"

          if [ "${image_count}" = "0" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf '알 수 없는 이미지 선택값입니다: %s\n' "${REQUESTED_IMAGE}" >&2
            exit 2
          fi

          printf 'images=%s\n' "${images}" >> "${GITHUB_OUTPUT}"
          printf 'image_count=%s\n' "${image_count}" >> "${GITHUB_OUTPUT}"
          printf '선택된 이미지: %s\n' "${images}"

  publish:
    name: 이미지 publish (${{ matrix.image }})
    needs: select-images
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.select-images.outputs.images) }}

    steps:
      - name: 소스 내려받기
        uses: actions/checkout@v4

      - name: Task 설치
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: AWS 인증 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::941141115079:role/github-actions-ecr-role
          aws-region: ap-northeast-2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          DOCKER_BUILD_CACHE_FROM: |
            type=gha,scope=${{ matrix.image }}-linux-amd64
            type=gha,scope=${{ matrix.image }}-linux-arm64
          DOCKER_BUILD_CACHE_TO: |
            type=gha,scope=${{ matrix.image }}-linux-amd64,mode=max
            type=gha,scope=${{ matrix.image }}-linux-arm64,mode=max
        run: |
          set -euo pipefail
          task app-image-build \
            SERVICE="${{ matrix.image }}" \
            IMAGE_REGISTRY="${IMAGE_REGISTRY}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            DOCKER_BUILD_PLATFORMS="${DOCKER_BUILD_PLATFORMS}" \
            DOCKER_BUILD_CACHE_FROM="${DOCKER_BUILD_CACHE_FROM}" \
            DOCKER_BUILD_CACHE_TO="${DOCKER_BUILD_CACHE_TO}"


      - name: digest 수집 및 deploy plan 작성
        id: deploy-plan
        shell: bash
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"
          image_ref="${IMAGE_REGISTRY}/${image}:${IMAGE_TAG}"

          digest=""
          digest_source=""
          digest="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${image}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          digest_source="ecr-api"

          if [ -z "${digest}" ]; then
            printf 'push된 이미지 digest를 확인할 수 없습니다: %s\n' "${image_ref}" >&2
            exit 1
          fi

          mkdir -p deploy-plan
          jq -n \
            --arg image "${image}" \
            --arg tag "${IMAGE_TAG}" \
            --arg image_ref "${image_ref}" \
            --arg digest "${digest}" \
            --arg digest_ref "${IMAGE_REGISTRY}/${image}@${digest}" \
            --arg digest_source "${digest_source}" \
            --arg source_sha "${GITHUB_SHA}" \
            '{
              image: $image,
              tag: $tag,
              image_ref: $image_ref,
              digest: $digest,
              digest_ref: $digest_ref,
              digest_source: $digest_source,
              source_sha: $source_sha,
              gitops_action: "updated"
            }' > "deploy-plan/${image}.json"

          {
            printf '### 이미지 publish\n\n'
            printf -- '- 이미지: `%s`\n' "${image}"
            printf -- '- 태그 참조: `%s`\n' "${image_ref}"
            printf -- '- digest 참조: `%s`\n' "${IMAGE_REGISTRY}/${image}@${digest}"
            printf -- '- digest 출처: `%s`\n' "${digest_source}"
            printf -- '- GitOps 작업: `updated`\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: 이미지별 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: deploy-plan-${{ matrix.image }}
          path: deploy-plan/${{ matrix.image }}.json
          if-no-files-found: error

  deploy-plan:
    name: deploy plan 조립 및 gitops 업데이트
    needs:
      - select-images
      - publish
    if: needs.select-images.outputs.image_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: 이미지별 deploy plan 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-plan-*
          path: deploy-plan
          merge-multiple: true

      - name: 통합 deploy plan 작성
        shell: bash
        run: |
          set -euo pipefail
          jq -s 'sort_by(.image)' deploy-plan/*.json > deploy-plan.json

          {
            printf '# 이미지 publish deploy plan\n\n'
            printf -- '- 소스 commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- registry: `%s`\n' "${IMAGE_REGISTRY}"
            printf -- '- GitOps 작업: `updated`\n\n'
            printf '| 이미지 | 태그 참조 | digest 참조 |\n'
            printf '| --- | --- | --- |\n'
            jq -r '.[] | "| `\(.image)` | `\(.image_ref)` | `\(.digest_ref)` |"' deploy-plan.json
          } > deploy-plan.md

          cat deploy-plan.md >> "${GITHUB_STEP_SUMMARY}"

      - name: 통합 deploy plan 업로드
        uses: actions/upload-artifact@v4
        with:
          name: image-publish-deploy-plan
          path: |
            deploy-plan.json
            deploy-plan.md
          if-no-files-found: error

      - name: gitops repo 체크아웃
        uses: actions/checkout@v4
        with:
          repository: Medikong/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: gitops values 이미지 태그 업데이트
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          jq -r '.[] | "\(.image) \(.tag)"' ../deploy-plan.json | while read -r image tag; do
            service_file="values/services/${image%-service}.yaml"
            if [ ! -f "${service_file}" ]; then
              service_file="values/services/${image}.yaml"
            fi

            if [ -f "${service_file}" ]; then
              sed -i "s|tag:.*|tag: ${tag}|g" "${service_file}"
              printf 'updated: %s -> %s\n' "${service_file}" "${tag}"
            else
              printf 'skip: %s not found\n' "${service_file}"
            fi
          done

      - name: gitops repo push
        shell: bash
        run: |
          set -euo pipefail
          cd gitops

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          if git diff --quiet; then
            printf 'no changes to commit\n'
            exit 0
          fi

          git add values/services/
          git commit -m "chore: update image tags to ${GITHUB_SHA}"
          git push
      - name: Discord 배포 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "이미지 배포 완료"
          description: "커밋: ${{ github.sha }}"
          color: 0x00ff00

  no-image-publish:
    name: 이미지 publish 없음
    needs: select-images
    if: needs.select-images.outputs.image_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: no-op 보고
        run: echo "이번 변경에서 publish할 Docker 이미지가 없습니다."
