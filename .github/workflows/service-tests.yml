name: Service Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: service-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-services:
    name: Detect service test scope
    runs-on: ubuntu-latest
    outputs:
      test_services: ${{ steps.matrix.outputs.test_services }}
      test_count: ${{ steps.matrix.outputs.test_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
            concert-service:
              - 'services/concert-service/**'
            notification-service:
              - 'services/notification-service/**'
            payment-service:
              - 'services/payment-service/**'
            reservation-service:
              - 'services/reservation-service/**'
            ticket-service:
              - 'services/ticket-service/**'
            test-common:
              - 'tests/**'
              - 'packages/**'
              - 'Taskfile.yml'
              - '.github/workflows/service-tests.yml'

      - name: Build test matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          all_test_services='["auth-service","concert-service","notification-service","payment-service","reservation-service","ticket-service"]'
          changed='${{ steps.changes.outputs.changes }}'
          service_filters='["auth-service","concert-service","notification-service","payment-service","reservation-service","ticket-service"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.changes.outputs['test-common'] }}" = "true" ]; then
            test_services="${all_test_services}"
          else
            test_services="$(jq -c --argjson allowed "${service_filters}" '[.[] | select(. as $name | $allowed | index($name))]' <<<"${changed}")"
          fi

          test_count="$(jq 'length' <<<"${test_services}")"
          printf 'test_services=%s\n' "${test_services}" >> "${GITHUB_OUTPUT}"
          printf 'test_count=%s\n' "${test_count}" >> "${GITHUB_OUTPUT}"
          printf 'Selected test services: %s\n' "${test_services}"

  service-unit:
    name: Service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count != '0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}

      - name: Run service unit tests in Docker
        shell: bash
        run: |
          set -euo pipefail
          services="$(jq -r 'join(" ")' <<'JSON'
          ${{ needs.detect-services.outputs.test_services }}
          JSON
          )"
          task test-services SERVICES="${services}"

      - name: Append unit test summary
        if: always()
        shell: bash
        run: |
          if [ -f tests/tmp/reports/unit/summary.md ]; then
            cat tests/tmp/reports/unit/summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: tests/tmp/reports/unit/
          if-no-files-found: ignore

  no-service-unit:
    name: No service unit tests
    needs: detect-services
    if: needs.detect-services.outputs.test_count == '0'
    runs-on: ubuntu-latest

    steps:
      - name: Report no-op
        run: echo "No managed service unit tests selected for this change."
