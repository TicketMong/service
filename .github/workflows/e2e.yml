name: E2E

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'tests/e2e/**'
      - 'packages/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Taskfile.yml'
      - '.github/workflows/e2e.yml'
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postman-newman:
    name: Postman E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run E2E in Docker Compose
        run: task test-e2e

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            tests/e2e/newman/reports/
          if-no-files-found: ignore
