version: "3"

vars:
  ROOT_DIR: '{{.TASKFILE_DIR}}/..'
  TEST_RUNNER_IMAGE_PREFIX: '{{default "ticketing-test-runner" .TEST_RUNNER_IMAGE_PREFIX}}'
  TEST_RUNNER_DOCKERFILE: '{{default "tests/docker/Dockerfile" .TEST_RUNNER_DOCKERFILE}}'
  PYTEST_ARGS: '{{default "-q -s -p no:cacheprovider" .PYTEST_ARGS}}'
  TEST_SERVICES: auth-service concert-service notification-service payment-service reservation-service ticket-service
  API_BENCHMARK_SERVICES: auth-service concert-service reservation-service payment-service ticket-service notification-service
  API_BENCHMARK_REPORT_ROOT: '{{default "tests/tmp/reports/api-integration" .API_BENCHMARK_REPORT_ROOT}}'
  API_BENCHMARK_DOC_DIR: '{{default "../workspace/docs/evidence/services/api-integration-test-benchmark/half-year-early-growth" .API_BENCHMARK_DOC_DIR}}'
  UNIT_REPORT_DIR: '{{default "tests/tmp/reports/unit" .UNIT_REPORT_DIR}}'
  PYTHON_BIN: '{{default "python3" .PYTHON_BIN}}'
  DOCKER_COMPOSE: '{{default "docker compose" .DOCKER_COMPOSE}}'
  E2E_COMPOSE_FILE: '{{default "tests/e2e/docker-compose.yml" .E2E_COMPOSE_FILE}}'
  E2E_COMPOSE_PROJECT: '{{default "ticketing-e2e" .E2E_COMPOSE_PROJECT}}'
  E2E_COMPOSE_SERVICES: '{{default "" .E2E_COMPOSE_SERVICES}}'
  E2E_NETWORK: '{{default "ticketing-e2e_default" .E2E_NETWORK}}'
  NEWMAN_IMAGE: '{{default "postman/newman:6-alpine" .NEWMAN_IMAGE}}'
  E2E_WAIT_TIMEOUT_SECONDS: '{{default "180" .E2E_WAIT_TIMEOUT_SECONDS}}'
  E2E_AUTH_SERVICE_URL: '{{default "http://auth-service:8080" .E2E_AUTH_SERVICE_URL}}'
  E2E_CONCERT_SERVICE_URL: '{{default "http://concert-service:8082" .E2E_CONCERT_SERVICE_URL}}'
  E2E_RESERVATION_SERVICE_URL: '{{default "http://reservation-service:8083" .E2E_RESERVATION_SERVICE_URL}}'
  E2E_PAYMENT_SERVICE_URL: '{{default "http://payment-service:8080" .E2E_PAYMENT_SERVICE_URL}}'
  E2E_TICKET_SERVICE_URL: '{{default "http://ticket-service:8085" .E2E_TICKET_SERVICE_URL}}'
  E2E_NOTIFICATION_SERVICE_URL: '{{default "http://notification-service:8084" .E2E_NOTIFICATION_SERVICE_URL}}'
  E2E_SCENARIO: '{{default "all" .E2E_SCENARIO}}'
  E2E_REPORT_NAME: '{{default "e2e" .E2E_REPORT_NAME}}'
  OBS_E2E_COMPOSE_FILE: '{{default "tests/e2e/observability/docker-compose.yml" .OBS_E2E_COMPOSE_FILE}}'
  OBS_E2E_COMPOSE_PROJECT: '{{default "ticketing-observability-e2e" .OBS_E2E_COMPOSE_PROJECT}}'
  OBS_E2E_NETWORK: '{{default "ticketing-observability-e2e_default" .OBS_E2E_NETWORK}}'
  OBS_E2E_SMOKE_IMAGE: '{{default "python:3.12-slim" .OBS_E2E_SMOKE_IMAGE}}'
  OBS_E2E_SERVICE_NAME: '{{default "concert-service" .OBS_E2E_SERVICE_NAME}}'
  OBS_E2E_SERVICE_URL: '{{default "http://concert-service:8082" .OBS_E2E_SERVICE_URL}}'
  OBS_E2E_TRACE_PATH: '{{default "/concerts" .OBS_E2E_TRACE_PATH}}'
  OBS_E2E_TEMPO_URL: '{{default "http://tempo:3200" .OBS_E2E_TEMPO_URL}}'
  OBS_E2E_EXCLUSION_CHECK_SECONDS: '{{default "8" .OBS_E2E_EXCLUSION_CHECK_SECONDS}}'

tasks:
  test-runner-build:
    desc: Build service-scoped Docker Python test runner images. Optionally set SERVICE=<service-name>.
    cmds:
      - |
        set -eu
        requested_service='{{default "" .SERVICE}}'
        normalize_service() {
          case "$1" in
            auth|auth-service) printf '%s\n' 'auth-service' ;;
            concert|concert-service) printf '%s\n' 'concert-service' ;;
            notification|notification-service) printf '%s\n' 'notification-service' ;;
            payment|payment-service) printf '%s\n' 'payment-service' ;;
            reservation|reservation-service) printf '%s\n' 'reservation-service' ;;
            ticket|ticket-service) printf '%s\n' 'ticket-service' ;;
            *) return 1 ;;
          esac
        }
        image_for_service() {
          printf '%s-%s:local\n' '{{.TEST_RUNNER_IMAGE_PREFIX}}' "$1"
        }
        build_service_image() {
          service="$1"
          image="$(image_for_service "${service}")"
          printf 'building %s for %s\n' "${image}" "${service}"
          docker build \
            --build-arg SERVICE="${service}" \
            -f "{{.ROOT_DIR}}/{{.TEST_RUNNER_DOCKERFILE}}" \
            -t "${image}" \
            "{{.ROOT_DIR}}"
        }
        if [ -n "${requested_service}" ]; then
          if ! service="$(normalize_service "${requested_service}")"; then
            printf 'Unknown SERVICE=%s (expected one of: {{.TEST_SERVICES}}).\n' "${requested_service}" >&2
            exit 2
          fi
          build_service_image "${service}"
          exit 0
        fi
        pids=""
        failed=0
        for service in {{.TEST_SERVICES}}; do
          build_service_image "${service}" &
          pids="${pids} $!"
        done
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        exit "${failed}"

  test-service:
    desc: Run one service pytest suite with SERVICE=<service-name>.
    cmds:
      - task: test-services
        vars:
          SERVICES: '{{default "" .SERVICE}}'

  test-services:
    desc: Run selected service pytest suites in parallel with SERVICES="<service-names>".
    cmds:
      - |
        set -eu
        requested_services='{{default "" .SERVICES}}'
        if [ -z "${requested_services}" ]; then
          printf '%s\n' 'SERVICES is required, for example: task test-services SERVICES="auth-service ticket-service"' >&2
          exit 2
        fi
        normalize_service() {
          case "$1" in
            auth|auth-service) printf '%s\n' 'auth-service' ;;
            concert|concert-service) printf '%s\n' 'concert-service' ;;
            notification|notification-service) printf '%s\n' 'notification-service' ;;
            payment|payment-service) printf '%s\n' 'payment-service' ;;
            reservation|reservation-service) printf '%s\n' 'reservation-service' ;;
            ticket|ticket-service) printf '%s\n' 'ticket-service' ;;
            *) return 1 ;;
          esac
        }
        image_for_service() {
          printf '%s-%s:local\n' '{{.TEST_RUNNER_IMAGE_PREFIX}}' "$1"
        }
        build_service_image() {
          service="$1"
          image="$(image_for_service "${service}")"
          printf 'building %s for %s\n' "${image}" "${service}"
          docker build \
            --build-arg SERVICE="${service}" \
            -f "{{.ROOT_DIR}}/{{.TEST_RUNNER_DOCKERFILE}}" \
            -t "${image}" \
            "{{.ROOT_DIR}}"
        }
        services=""
        for requested in ${requested_services}; do
          if ! service="$(normalize_service "${requested}")"; then
            printf 'Unknown SERVICE=%s (expected one of: {{.TEST_SERVICES}}).\n' "${requested}" >&2
            exit 2
          fi
          case " ${services} " in
            *" ${service} "*) ;;
            *) services="${services} ${service}" ;;
          esac
        done
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        reports_root="${repo_root}/{{.UNIT_REPORT_DIR}}"
        rm -rf "${reports_root}"
        mkdir -p "${reports_root}"
        python_bin='{{.PYTHON_BIN}}'
        pids=""
        failed=0
        for service in ${services}; do
          build_service_image "${service}" &
          pids="${pids} $!"
        done
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        if [ "${failed}" -ne 0 ]; then
          exit 1
        fi
        utc_now() {
          "${python_bin}" -c 'from datetime import datetime, timezone; print(datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"))'
        }
        epoch_now() {
          "${python_bin}" -c 'import time; print(int(time.time()))'
        }
        failed=0
        for service in ${services}; do
          (
            image="$(image_for_service "${service}")"
            report_dir="${reports_root}/${service}"
            rm -rf "${report_dir}"
            mkdir -p "${report_dir}"
            started_at="$(utc_now)"
            started_epoch="$(epoch_now)"
            exit_code=0
            status=passed
            set +e
            docker run --rm \
              -v "${repo_root}":/workspace \
              -w "/workspace/services/${service}" \
              "${image}" \
              sh -c "COVERAGE_FILE=/workspace/{{.UNIT_REPORT_DIR}}/${service}/.coverage PYTHONPATH=. /opt/test-env/bin/python -m pytest {{.PYTEST_ARGS}} --junitxml=/workspace/{{.UNIT_REPORT_DIR}}/${service}/junit.xml --cov=app --cov-report=term-missing --cov-report=xml:/workspace/{{.UNIT_REPORT_DIR}}/${service}/coverage.xml --cov-report=html:/workspace/{{.UNIT_REPORT_DIR}}/${service}/htmlcov" \
              > "${report_dir}/pytest.log" 2>&1
            exit_code="$?"
            set -e
            if [ "${exit_code}" -ne 0 ]; then
              status=failed
            fi
            finished_at="$(utc_now)"
            finished_epoch="$(epoch_now)"
            duration_seconds="$((finished_epoch - started_epoch))"
            "${python_bin}" "{{.ROOT_DIR}}/tests/scripts/unit_report_summary.py" service \
              --service "${service}" \
              --report-dir "${report_dir}" \
              --status "${status}" \
              --exit-code "${exit_code}" \
              --started-at "${started_at}" \
              --finished-at "${finished_at}" \
              --duration-seconds "${duration_seconds}"
            exit "${exit_code}"
          ) &
          pids="${pids} $!"
        done
        for pid in ${pids}; do
          if ! wait "${pid}"; then
            failed=1
          fi
        done
        "${python_bin}" "{{.ROOT_DIR}}/tests/scripts/unit_report_summary.py" aggregate --reports-root "${reports_root}"
        exit "${failed}"

  test-unit:
    desc: Run all managed service pytest suites in service-scoped Docker runners.
    cmds:
      - task: test-services
        vars:
          SERVICES: '{{.TEST_SERVICES}}'

  benchmark-concert-public-api:
    cmds:
      - task: test-runner-build
        vars:
          SERVICE: concert-service
      - |
        set -eu
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        image='{{.TEST_RUNNER_IMAGE_PREFIX}}-concert-service:local'
        service_head="$(git -C "${repo_root}" rev-parse --short HEAD)"
        service_dirty=false
        if [ -n "$(git -C "${repo_root}" status --short)" ]; then
          service_dirty=true
        fi
        docker run --rm \
          -e SERVICE_GIT_HEAD="${service_head}" \
          -e SERVICE_GIT_DIRTY="${service_dirty}" \
          -e TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal \
          -v "${repo_root}":/workspace \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -w /workspace/services/concert-service \
          "${image}" \
          sh -c "PYTHONPATH=. /opt/test-env/bin/python -m pytest {{.PYTEST_ARGS}} --run-public-api-benchmark --public-benchmark-concerts={{default "1000" .CONCERTS}} --public-benchmark-showtimes-per-concert={{default "4" .SHOWTIMES_PER_CONCERT}} --public-benchmark-seats-per-showtime={{default "100" .SEATS_PER_SHOWTIME}} --public-benchmark-samples={{default "50" .SAMPLES}} --public-benchmark-warmup={{default "5" .WARMUP}} tests/integration/test_public_api_benchmark.py"

  benchmark-api-smoke:
    cmds:
      - |
        set -eu
        for service in {{.API_BENCHMARK_SERVICES}}; do
          task --dir "{{.ROOT_DIR}}/tests" benchmark-api-smoke-service SERVICE="${service}" PRESET='{{default "smoke" .PRESET}}' SAMPLES='{{default "5" .SAMPLES}}' WARMUP='{{default "1" .WARMUP}}' API_BENCHMARK_REPORT_ROOT='{{.API_BENCHMARK_REPORT_ROOT}}' PYTEST_ARGS='{{.PYTEST_ARGS}}'
        done

  benchmark-api-smoke-service:
    cmds:
      - task: benchmark-api-service
        vars:
          SERVICE: '{{default "" .SERVICE}}'
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-large:
    cmds:
      - |
        set -eu
        for service in {{.API_BENCHMARK_SERVICES}}; do
          task --dir "{{.ROOT_DIR}}/tests" benchmark-api-large-service SERVICE="${service}" PRESET='{{default "half-year-early-growth" .PRESET}}' SAMPLES='{{default "100" .SAMPLES}}' WARMUP='{{default "2" .WARMUP}}' API_BENCHMARK_REPORT_ROOT='{{.API_BENCHMARK_REPORT_ROOT}}' PYTEST_ARGS='{{.PYTEST_ARGS}}'
        done

  benchmark-api-large-service:
    cmds:
      - task: benchmark-api-service
        vars:
          SERVICE: '{{default "" .SERVICE}}'
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-service:
    internal: true
    cmds:
      - |
        set -eu
        requested='{{default "" .SERVICE}}'
        preset='{{default "smoke" .PRESET}}'
        samples='{{default "5" .SAMPLES}}'
        warmup='{{default "1" .WARMUP}}'
        normalize_service() {
          case "$1" in
            auth|auth-service) printf '%s\n' 'auth-service' ;;
            concert|concert-service) printf '%s\n' 'concert-service' ;;
            reservation|reservation-service) printf '%s\n' 'reservation-service' ;;
            payment|payment-service) printf '%s\n' 'payment-service' ;;
            ticket|ticket-service) printf '%s\n' 'ticket-service' ;;
            notification|notification-service) printf '%s\n' 'notification-service' ;;
            *) return 1 ;;
          esac
        }
        if [ -z "${requested}" ]; then
          printf '%s\n' 'SERVICE is required, for example: task benchmark-api-smoke-service SERVICE=reservation-service PRESET=smoke' >&2
          exit 2
        fi
        if ! service="$(normalize_service "${requested}")"; then
          printf 'Unknown SERVICE=%s (expected one of: {{.API_BENCHMARK_SERVICES}}).\n' "${requested}" >&2
          exit 2
        fi
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        key="${service%-service}"
        flag="--run-${key}-api-benchmark"
        artifact_dir="${repo_root}/{{.API_BENCHMARK_REPORT_ROOT}}/${service}/${preset}"
        rm -rf "${artifact_dir}"
        mkdir -p "${artifact_dir}"
        (
          cd "${repo_root}/services/${service}"
          uv run --group test pytest {{.PYTEST_ARGS}} \
            "${flag}" \
            "--${key}-benchmark-preset=${preset}" \
            "--${key}-benchmark-samples=${samples}" \
            "--${key}-benchmark-warmup=${warmup}" \
            "--${key}-benchmark-artifact-dir=${artifact_dir}" \
            tests/integration/test_api_benchmark.py
        )
        if [ ! -s "${artifact_dir}/latest.json" ]; then
          printf 'Benchmark artifact was not created for service=%s preset=%s. Docker/testcontainers may be unavailable or the benchmark was skipped.\n' "${service}" "${preset}" >&2
          exit 3
        fi
        printf 'wrote %s/latest.json\n' "${artifact_dir}"

  benchmark-api-smoke-auth:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: auth-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-smoke-concert:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: concert-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-smoke-reservation:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: reservation-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-smoke-payment:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: payment-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-smoke-ticket:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: ticket-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-smoke-notification:
    cmds:
      - task: benchmark-api-smoke-service
        vars:
          SERVICE: notification-service
          PRESET: '{{default "smoke" .PRESET}}'
          SAMPLES: '{{default "5" .SAMPLES}}'
          WARMUP: '{{default "1" .WARMUP}}'

  benchmark-api-large-reservation:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: reservation-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-large-payment:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: payment-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-large-ticket:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: ticket-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-large-notification:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: notification-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-large-auth:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: auth-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-large-concert:
    cmds:
      - task: benchmark-api-large-service
        vars:
          SERVICE: concert-service
          PRESET: '{{default "half-year-early-growth" .PRESET}}'
          SAMPLES: '{{default "100" .SAMPLES}}'
          WARMUP: '{{default "2" .WARMUP}}'

  benchmark-api-report:
    cmds:
      - |
        set -eu
        service='{{default "all" .SERVICE}}'
        cd "{{.ROOT_DIR}}"
        uv run python tests/scripts/api_benchmark_report.py \
          --reports-root '{{.API_BENCHMARK_REPORT_ROOT}}' \
          --output-dir '{{.API_BENCHMARK_DOC_DIR}}' \
          --service "${service}"

  test-e2e:
    desc: Run Docker Compose service E2E tests. Optionally set SCENARIO=<scenario-name>.
    cmds:
      - |
        set -e
        scenario='{{default "" .SCENARIO}}'
        compose_services='{{.E2E_COMPOSE_SERVICES}}'
        scenario_key='{{.E2E_SCENARIO}}'
        report_name='{{.E2E_REPORT_NAME}}'
        if [ -n "${scenario}" ]; then
          scenario_key="${scenario}"
        fi
        scenario_key="${scenario_key#scenarios/}"
        scenario_key="${scenario_key%.postman_collection.json}"
        case "${scenario_key}" in
          all|"")
            compose_services="${compose_services:-postgres kafka kafka-init notification-db auth-service concert-service reservation-service payment-service ticket-service notification-service}"
            collections="01-concert-seat-setup 02-reservation-create 03-ticket-issue 04-user-booking-happy-path"
            ;;
          01-concert-seat-setup)
            compose_services="${compose_services:-postgres concert-service}"
            collections="01-concert-seat-setup"
            ;;
          02-reservation-create)
            compose_services="${compose_services:-postgres reservation-service}"
            collections="02-reservation-create"
            ;;
          03-ticket-issue)
            compose_services="${compose_services:-postgres kafka kafka-init ticket-service}"
            collections="03-ticket-issue"
            ;;
          04-user-booking-happy-path)
            compose_services="${compose_services:-postgres kafka kafka-init notification-db auth-service concert-service reservation-service payment-service ticket-service notification-service}"
            collections="04-user-booking-happy-path"
            ;;
          05-concert-public-api-benchmark)
            compose_services="${compose_services:-postgres concert-service}"
            collections="05-concert-public-api-benchmark"
            ;;
          *)
            printf 'Unknown E2E SCENARIO=%s (expected: all, 01-concert-seat-setup, 02-reservation-create, 03-ticket-issue, 04-user-booking-happy-path, 05-concert-public-api-benchmark).\n' "${scenario_key}" >&2
            exit 2
            ;;
        esac
        compose_cmd='{{.DOCKER_COMPOSE}}'
        project='{{.E2E_COMPOSE_PROJECT}}'
        file='{{.ROOT_DIR}}/{{.E2E_COMPOSE_FILE}}'
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        mkdir -p "${repo_root}/tests/e2e/newman/reports"
        trap '${compose_cmd} -p "${project}" -f "${file}" down -v --remove-orphans' EXIT
        ${compose_cmd} -p "${project}" -f "${file}" up -d --build --wait --wait-timeout {{.E2E_WAIT_TIMEOUT_SECONDS}} ${compose_services}
        for collection in ${collections}; do
          docker run --rm --network {{.E2E_NETWORK}} \
            -v "${repo_root}/tests/e2e":/etc/newman \
            -w /etc/newman \
            {{.NEWMAN_IMAGE}} run "scenarios/${collection}.postman_collection.json" \
            -e newman/docker.postman_environment.json \
            --env-var authServiceUrl="{{.E2E_AUTH_SERVICE_URL}}" \
            --env-var concertServiceUrl="{{.E2E_CONCERT_SERVICE_URL}}" \
            --env-var reservationServiceUrl="{{.E2E_RESERVATION_SERVICE_URL}}" \
            --env-var paymentServiceUrl="{{.E2E_PAYMENT_SERVICE_URL}}" \
            --env-var ticketServiceUrl="{{.E2E_TICKET_SERVICE_URL}}" \
            --env-var notificationServiceUrl="{{.E2E_NOTIFICATION_SERVICE_URL}}" \
            --reporters cli,junit \
            --delay-request 1000 \
            --reporter-junit-export "newman/reports/${report_name}-${collection}.xml"
        done

  e2e-up:
    desc: Start the service E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.E2E_COMPOSE_PROJECT}} -f "{{.ROOT_DIR}}/{{.E2E_COMPOSE_FILE}}" up -d --build --wait --wait-timeout {{.E2E_WAIT_TIMEOUT_SECONDS}} postgres kafka kafka-init notification-db auth-service concert-service reservation-service payment-service ticket-service notification-service'

  e2e-wait:
    desc: Wait for service E2E services to become healthy through Docker Compose.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.E2E_COMPOSE_PROJECT}} -f "{{.ROOT_DIR}}/{{.E2E_COMPOSE_FILE}}" up -d --wait --wait-timeout {{.E2E_WAIT_TIMEOUT_SECONDS}}'

  e2e-newman:
    desc: Run service E2E Newman collections against an already running stack.
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/tests/e2e/newman/reports"
      - |
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        for collection in 01-concert-seat-setup 02-reservation-create 03-ticket-issue 04-user-booking-happy-path; do
          docker run --rm --network {{.E2E_NETWORK}} \
            -v "${repo_root}/tests/e2e":/etc/newman \
            -w /etc/newman \
            {{.NEWMAN_IMAGE}} run "scenarios/${collection}.postman_collection.json" \
            -e newman/docker.postman_environment.json \
            --env-var authServiceUrl="{{.E2E_AUTH_SERVICE_URL}}" \
            --env-var concertServiceUrl="{{.E2E_CONCERT_SERVICE_URL}}" \
            --env-var reservationServiceUrl="{{.E2E_RESERVATION_SERVICE_URL}}" \
            --env-var paymentServiceUrl="{{.E2E_PAYMENT_SERVICE_URL}}" \
            --env-var ticketServiceUrl="{{.E2E_TICKET_SERVICE_URL}}" \
            --env-var notificationServiceUrl="{{.E2E_NOTIFICATION_SERVICE_URL}}" \
            --reporters cli,junit \
            --delay-request 1000 \
            --reporter-junit-export "newman/reports/{{.E2E_REPORT_NAME}}-${collection}.xml"
        done

  e2e-down:
    desc: Stop the service E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.E2E_COMPOSE_PROJECT}} -f "{{.ROOT_DIR}}/{{.E2E_COMPOSE_FILE}}" down -v --remove-orphans'

  test-observability-e2e:
    desc: Run Docker Compose observability E2E trace smoke with Collector, Tempo, and Grafana.
    cmds:
      - |
        set -e
        compose_cmd='{{.DOCKER_COMPOSE}}'
        project='{{.OBS_E2E_COMPOSE_PROJECT}}'
        file='{{.ROOT_DIR}}/{{.OBS_E2E_COMPOSE_FILE}}'
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        trap '${compose_cmd} -p "${project}" -f "${file}" down -v --remove-orphans' EXIT
        ${compose_cmd} -p "${project}" -f "${file}" up -d --build postgres tempo otel-collector grafana concert-service
        docker run --rm --network {{.OBS_E2E_NETWORK}} \
          -v "${repo_root}/tests/e2e/observability/scripts":/scripts:ro \
          -e OBS_E2E_SERVICE_NAME="{{.OBS_E2E_SERVICE_NAME}}" \
          -e OBS_E2E_SERVICE_URL="{{.OBS_E2E_SERVICE_URL}}" \
          -e OBS_E2E_TRACE_PATH="{{.OBS_E2E_TRACE_PATH}}" \
          -e OBS_E2E_TEMPO_URL="{{.OBS_E2E_TEMPO_URL}}" \
          -e OBS_E2E_EXCLUSION_CHECK_SECONDS="{{.OBS_E2E_EXCLUSION_CHECK_SECONDS}}" \
          -e OBS_E2E_TIMEOUT_SECONDS \
          -e OBS_E2E_SLEEP_SECONDS \
          {{.OBS_E2E_SMOKE_IMAGE}} python /scripts/trace-smoke.py

  observability-e2e-up:
    desc: Start the observability E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.OBS_E2E_COMPOSE_PROJECT}} -f "{{.ROOT_DIR}}/{{.OBS_E2E_COMPOSE_FILE}}" up -d --build postgres tempo otel-collector grafana concert-service'

  observability-e2e-smoke:
    desc: Run observability E2E trace smoke against an already running stack.
    cmds:
      - |
        repo_root="$(cd "{{.ROOT_DIR}}" && pwd -P)"
        docker run --rm --network {{.OBS_E2E_NETWORK}} \
          -v "${repo_root}/tests/e2e/observability/scripts":/scripts:ro \
          -e OBS_E2E_SERVICE_NAME="{{.OBS_E2E_SERVICE_NAME}}" \
          -e OBS_E2E_SERVICE_URL="{{.OBS_E2E_SERVICE_URL}}" \
          -e OBS_E2E_TRACE_PATH="{{.OBS_E2E_TRACE_PATH}}" \
          -e OBS_E2E_TEMPO_URL="{{.OBS_E2E_TEMPO_URL}}" \
          -e OBS_E2E_EXCLUSION_CHECK_SECONDS="{{.OBS_E2E_EXCLUSION_CHECK_SECONDS}}" \
          -e OBS_E2E_TIMEOUT_SECONDS \
          -e OBS_E2E_SLEEP_SECONDS \
          {{.OBS_E2E_SMOKE_IMAGE}} python /scripts/trace-smoke.py

  observability-e2e-down:
    desc: Stop the observability E2E Docker Compose stack.
    cmds:
      - '{{.DOCKER_COMPOSE}} -p {{.OBS_E2E_COMPOSE_PROJECT}} -f "{{.ROOT_DIR}}/{{.OBS_E2E_COMPOSE_FILE}}" down -v --remove-orphans'
